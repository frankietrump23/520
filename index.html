<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>致你 · 五月二十日</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a160e;--ink-m:#5c4a2e;--ink-l:#9a8060;
  --paper:#f4eedf;--paper-w:#ece3d0;
  --red:#b02828;--red-s:#cc3e3e;--red-l:#e8b0a0;
  --jade:#356848;--jade-l:#6aa070;
  --gold:#a88010;--gold-l:#d4b440;
  --water:#5888a4;--water-l:#a8cce0;
  --lotus:#c85870;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--paper);
  font-family:'Noto Serif SC','STSong','SimSun',serif;color:var(--ink);user-select:none}

/* ===== loading ===== */
#loading{position:fixed;inset:0;z-index:300;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity 1s}
.ink-drop{width:52px;height:52px;border-radius:50%;background:var(--ink);
  animation:idp 1.6s ease-in-out infinite;position:relative;overflow:hidden}
.ink-drop::after{content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,rgba(255,255,255,.2),transparent 60%)}
@keyframes idp{0%,100%{transform:scale(.82);opacity:.65}50%{transform:scale(1.06);opacity:1}}
#loading p{font-size:12px;color:var(--ink-l);letter-spacing:5px}

/* ===== 主场景 ===== */
#scene{position:relative;width:100%;height:100vh;overflow:hidden;display:none}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%}
#fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:40}

/* ===== 标题 ===== */
#hdr{position:absolute;top:0;left:0;right:0;text-align:center;
  padding:18px 16px 0;pointer-events:none;z-index:10;
  background:linear-gradient(to bottom,rgba(244,238,223,.92) 50%,transparent)}
#hdr .dt{font-size:10px;color:var(--ink-l);letter-spacing:5px}
#hdr h1{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:10px;
  margin-top:5px;text-shadow:0 1px 8px rgba(176,40,40,.08)}
#hdr .sub{font-size:10px;color:var(--ink-l);letter-spacing:2px;margin-top:3px}

/* ===== 倒计时 ===== */
#cd{position:absolute;top:86px;right:12px;z-index:10;
  background:rgba(236,227,208,.85);border:.5px solid rgba(168,128,16,.4);
  border-radius:6px;padding:6px 12px;text-align:center;backdrop-filter:blur(6px)}
#cd .n{font-size:24px;font-weight:600;color:var(--red);line-height:1}
#cd .c{font-size:9px;color:var(--ink-l);letter-spacing:1px;margin-top:1px}

/* ===== 进度 ===== */
#prog{position:absolute;top:86px;left:12px;z-index:10;
  font-size:10px;color:var(--ink-l);letter-spacing:1px;pointer-events:none}
#pb{width:52px;height:2px;background:rgba(0,0,0,.06);border-radius:1px;margin-top:4px;overflow:hidden}
#pf{height:100%;background:var(--red);border-radius:1px;width:0;transition:width .5s}

/* ===== 景物 ===== */
.spot{position:absolute;cursor:pointer;z-index:5;
  transition:transform .2s cubic-bezier(.34,1.4,.64,1)}
.spot:active{transform:scale(.88)!important}
.spot svg{display:block;filter:drop-shadow(0 2px 8px rgba(26,22,14,.12))}
.spot .lb{text-align:center;font-size:9px;color:var(--ink-l);letter-spacing:2px;margin-top:2px;
  opacity:.7;transition:opacity .3s}
.spot:hover .lb{opacity:1}
.spot .hint{position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  background:rgba(176,40,40,.06);border:.5px solid rgba(176,40,40,.25);
  border-radius:3px;padding:1px 7px;font-size:9px;color:var(--red);
  white-space:nowrap;animation:hf 2s ease-in-out infinite;pointer-events:none}
@keyframes hf{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
.done-dot{position:absolute;top:-4px;right:-4px;width:14px;height:14px;
  background:var(--red);border-radius:50%;font-size:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;z-index:6;
  animation:dotPop .3s cubic-bezier(.34,1.5,.64,1)}
@keyframes dotPop{from{transform:scale(0)}}

/* ===== 底栏 ===== */
#bar{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 26px;
  display:flex;gap:10px;align-items:center;justify-content:center;
  background:linear-gradient(to top,rgba(244,238,223,.95) 50%,transparent);z-index:10}
.btn{background:rgba(244,238,223,.8);border:.5px solid var(--ink-l);border-radius:3px;
  padding:8px 18px;font-family:inherit;font-size:12px;color:var(--ink);
  letter-spacing:3px;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.btn:active{background:var(--ink);color:var(--paper)}
.btn.r{border-color:var(--red);color:var(--red)}
.btn.r:active{background:var(--red);color:#fff}

/* ===== 暗语 ===== */
#ulk{position:absolute;bottom:78px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;pointer-events:none;transition:opacity .4s;z-index:20}
#ulk.on{opacity:1;pointer-events:all}
#ulk p{font-size:10px;color:var(--ink-l);letter-spacing:3px}
#ulk input{width:100px;background:transparent;border:none;
  border-bottom:1px solid var(--ink-l);outline:none;font-family:inherit;
  font-size:20px;text-align:center;color:var(--red);letter-spacing:10px;padding:3px 6px}

/* ===== overlay ===== */
.ov{position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .35s}
.ov.on{opacity:1;pointer-events:all}

/* ===== 情话卡片 ===== */
.card{background:var(--paper);border-radius:2px;width:100%;max-width:310px;
  padding:32px 26px 24px;position:relative;
  transform:scale(.84) translateY(20px);
  transition:transform .4s cubic-bezier(.34,1.5,.64,1);
  box-shadow:0 4px 28px rgba(26,22,14,.18)}
.ov.on .card{transform:scale(1) translateY(0)}
.card::before,.card::after{content:'';position:absolute;
  width:16px;height:16px;border-color:rgba(176,40,40,.3);border-style:solid}
.card::before{top:8px;left:8px;border-width:1px 0 0 1px}
.card::after{bottom:8px;right:8px;border-width:0 1px 1px 0}
.card .x{position:absolute;top:8px;right:12px;font-size:18px;
  color:var(--ink-l);cursor:pointer;background:none;border:none;font-family:inherit}
.card .ico{text-align:center;font-size:28px;margin-bottom:12px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.08))}
.card .ttl{font-size:11px;color:var(--ink-l);letter-spacing:4px;text-align:center;margin-bottom:16px}
.card .bdy{font-size:14px;line-height:2.1;color:var(--ink);text-align:center;
  white-space:pre-line;min-height:68px;letter-spacing:.5px}
.card .ft{margin-top:16px;font-size:10px;color:var(--ink-l);text-align:center;letter-spacing:1px}

/* ===== 信件 ===== */
#ltr .card{max-width:340px;padding:34px 28px 26px}
.lhd{text-align:center;margin-bottom:20px}
.seal{display:inline-block;width:36px;height:36px;border:1.5px solid var(--red);
  border-radius:3px;color:var(--red);font-size:13px;font-weight:600;
  line-height:36px;text-align:center;margin-bottom:8px;
  animation:sg 3s ease-in-out infinite}
@keyframes sg{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 0 4px rgba(176,40,40,.1)}}
.lhd h2{font-size:16px;font-weight:600;letter-spacing:6px;color:var(--ink)}
.lbdy{font-size:13px;line-height:2.4;color:var(--ink);
  border-top:.5px solid var(--paper-w);padding-top:16px;white-space:pre-line;letter-spacing:.5px}
.lft{margin-top:20px;text-align:right;font-size:10px;color:var(--ink-l);letter-spacing:1px}

/* ===== 彩蛋：月夜场景 ===== */
#egg-scene{position:fixed;inset:0;z-index:150;display:none;
  background:linear-gradient(to bottom,#0a0e18 0%,#141e30 40%,#1a2840 70%,#0e1828 100%)}
#egg-canvas{position:absolute;inset:0;width:100%;height:100%}
#egg-content{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:5;padding:20px}
#egg-poem{color:rgba(230,220,200,.9);font-size:16px;line-height:2.4;
  text-align:center;letter-spacing:2px;opacity:0;
  transform:translateY(20px);transition:all 1s .5s}
#egg-scene.on #egg-poem{opacity:1;transform:translateY(0)}
#egg-close{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:10;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.15);
  border-radius:20px;padding:6px 20px;color:rgba(255,255,255,.5);font-family:inherit;
  font-size:11px;letter-spacing:2px;cursor:pointer}
#egg-close:active{background:rgba(255,255,255,.15)}

/* ===== 成就 ===== */
#toast{position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.7);z-index:200;
  background:var(--paper);border:.5px solid var(--gold);
  border-radius:8px;padding:20px 32px;text-align:center;
  opacity:0;transition:transform .4s cubic-bezier(.34,1.5,.64,1),opacity .3s;pointer-events:none}
#toast.on{transform:translate(-50%,-50%) scale(1);opacity:1}
#toast p{font-size:13px;color:var(--ink);margin-top:8px;letter-spacing:2px}

/* ===== 墨滴 ===== */
.ink-d{position:fixed;pointer-events:none;z-index:45;border-radius:50%;
  background:var(--ink);animation:ids .5s ease-out forwards}
@keyframes ids{0%{transform:scale(0);opacity:.6}60%{transform:scale(1.3);opacity:.2}100%{transform:scale(1.6);opacity:0}}
</style>
</head>
<body>

<div id="loading"><div class="ink-drop"></div><p>铺纸研墨…</p></div>

<div id="scene">
  <canvas id="bg-canvas"></canvas>
  <canvas id="fx-canvas"></canvas>

  <div id="hdr">
    <div class="dt">二〇二六 · 五月 · 二十日</div>
    <h1>致 · 你</h1>
    <div class="sub">轻触园中，有话藏在这里</div>
  </div>
  <div id="cd"><div class="n" id="cdn">3</div><div class="c" id="cdc">天后见你</div></div>
  <div id="prog">已寻得 <span id="pc">0</span>/10<div id="pb"><div id="pf"></div></div></div>

  <!-- ===== 园林景物（按中国园林布局） ===== -->

  <!-- 远景：左侧竹林 -->
  <div class="spot" id="s0" style="left:3%;top:28%;" onclick="openC(0)">
    <svg width="48" height="88" viewBox="0 0 48 88">
      <rect x="16" y="2" width="6" height="82" rx="3" fill="#4a7a40"/>
      <rect x="25" y="10" width="5" height="72" rx="2.5" fill="#3c6c34"/>
      <rect x="9" y="16" width="4" height="64" rx="2" fill="#5a8a50"/>
      <line x1="15" y1="26" x2="23" y2="26" stroke="#2e5428" stroke-width=".8"/>
      <line x1="15" y1="50" x2="23" y2="50" stroke="#2e5428" stroke-width=".8"/>
      <line x1="15" y1="72" x2="23" y2="72" stroke="#2e5428" stroke-width=".8"/>
      <line x1="24" y1="36" x2="31" y2="36" stroke="#2e5428" stroke-width=".8"/>
      <line x1="24" y1="58" x2="31" y2="58" stroke="#2e5428" stroke-width=".8"/>
      <ellipse cx="14" cy="8" rx="10" ry="3" fill="#3c6c34" transform="rotate(-26 14 8)"/>
      <ellipse cx="30" cy="5" rx="8" ry="2.5" fill="#5a8a50" transform="rotate(22 30 5)"/>
      <ellipse cx="9" cy="14" rx="7" ry="2.2" fill="#5a8a50" transform="rotate(-40 9 14)"/>
    </svg>
    <div class="lb">竹</div>
    <div class="hint">轻触</div>
  </div>

  <!-- 远景：右侧梅花 -->
  <div class="spot" id="s1" style="right:2%;top:24%;" onclick="openC(1)">
    <svg width="50" height="65" viewBox="0 0 50 65">
      <path d="M25 62 Q22 46 18 28 Q24 20 28 14" stroke="#5c3c20" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M25 44 Q32 36 40 30" stroke="#5c3c20" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M21 34 Q14 28 10 20" stroke="#5c3c20" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <g transform="translate(26 12)"><circle cx="0" cy="-6" r="3.8" fill="#d89098"/><circle cx="5.7" cy="-1.9" r="3.8" fill="#e0a0a8"/><circle cx="3.5" cy="4.9" r="3.8" fill="#d89098"/><circle cx="-3.5" cy="4.9" r="3.8" fill="#e0a0a8"/><circle cx="-5.7" cy="-1.9" r="3.8" fill="#d89098"/><circle cx="0" cy="0" r="2.8" fill="#e8c840"/></g>
      <g transform="translate(40 28)"><circle cx="0" cy="-4.8" r="2.8" fill="#d89098"/><circle cx="4.6" cy="-1.5" r="2.8" fill="#e0a0a8"/><circle cx="2.8" cy="3.8" r="2.8" fill="#d89098"/><circle cx="-2.8" cy="3.8" r="2.8" fill="#e0a0a8"/><circle cx="-4.6" cy="-1.5" r="2.8" fill="#d89098"/><circle cx="0" cy="0" r="2" fill="#e8c840"/></g>
      <g transform="translate(10 18)"><circle cx="0" cy="-5" r="3.2" fill="#e0a0a8"/><circle cx="4.8" cy="-1.5" r="3.2" fill="#d89098"/><circle cx="3" cy="4" r="3.2" fill="#e0a0a8"/><circle cx="-3" cy="4" r="3.2" fill="#d89098"/><circle cx="-4.8" cy="-1.5" r="3.2" fill="#e0a0a8"/><circle cx="0" cy="0" r="2.2" fill="#e8c840"/></g>
    </svg>
    <div class="lb">梅</div>
  </div>

  <!-- 中景：中央亭子 -->
  <div class="spot" id="s2" style="left:50%;top:35%;transform:translateX(-50%);" onclick="openC(2)">
    <svg width="80" height="80" viewBox="0 0 80 80">
      <polygon points="40,4 74,36 6,36" fill="#b02828" opacity=".9"/>
      <polygon points="40,4 68,32 12,32" fill="#c84040" opacity=".55"/>
      <path d="M6 36 Q3 30 5 26" stroke="#b02828" stroke-width="1.5" fill="none"/>
      <path d="M74 36 Q77 30 75 26" stroke="#b02828" stroke-width="1.5" fill="none"/>
      <rect x="14" y="36" width="5" height="32" fill="#7a5e18" rx="1"/>
      <rect x="61" y="36" width="5" height="32" fill="#7a5e18" rx="1"/>
      <rect x="24" y="36" width="5" height="32" fill="#8a6e20" rx="1"/>
      <rect x="51" y="36" width="5" height="32" fill="#8a6e20" rx="1"/>
      <rect x="10" y="65" width="60" height="8" fill="#c0a060" rx="2"/>
      <rect x="12" y="50" width="56" height="2" fill="#7a5e18" rx="1" opacity=".5"/>
    </svg>
    <div class="lb">听风亭</div>
  </div>

  <!-- 中景：月洞门（亭左） -->
  <div class="spot" id="s3" style="left:10%;top:44%;" onclick="openC(3)">
    <svg width="50" height="66" viewBox="0 0 50 66">
      <rect x="2" y="16" width="46" height="48" fill="#cdc0a4" opacity=".6"/>
      <circle cx="25" cy="38" r="19" fill="#f4eedf"/>
      <circle cx="25" cy="38" r="19" fill="none" stroke="#b09060" stroke-width="1.8"/>
      <circle cx="25" cy="38" r="18" fill="rgba(168,204,224,.2)"/>
      <line x1="25" y1="56" x2="25" y2="44" stroke="#356848" stroke-width="1.2"/>
      <circle cx="25" cy="42" r="5" fill="rgba(53,104,72,.4)"/>
      <rect x="2" y="8" width="46" height="10" fill="#b09060" opacity=".35"/>
    </svg>
    <div class="lb">月洞门</div>
  </div>

  <!-- 中景：灯笼（亭上） -->
  <div class="spot" id="s4" style="left:50%;top:14%;transform:translateX(-50%);" onclick="openC(4)">
    <svg width="28" height="52" viewBox="0 0 28 52">
      <line x1="14" y1="0" x2="14" y2="6" stroke="#7a6038" stroke-width=".8"/>
      <path d="M4 10 Q1 20 1 27 Q1 36 4 44L24 44 Q27 36 27 27 Q27 20 24 10Z" fill="#b02828" opacity=".92"/>
      <ellipse cx="14" cy="10" rx="10" ry="2.5" fill="#801010"/>
      <ellipse cx="14" cy="44" rx="10" ry="2.5" fill="#801010"/>
      <ellipse cx="14" cy="27" rx="6" ry="8" fill="#f0c838" opacity=".22"/>
      <line x1="8" y1="12" x2="7" y2="42" stroke="#801010" stroke-width=".4" opacity=".35"/>
      <line x1="20" y1="12" x2="21" y2="42" stroke="#801010" stroke-width=".4" opacity=".35"/>
      <line x1="11" y1="46" x2="9" y2="52" stroke="#f0c838" stroke-width="1"/>
      <line x1="14" y1="46" x2="14" y2="52" stroke="#f0c838" stroke-width="1"/>
      <line x1="17" y1="46" x2="19" y2="52" stroke="#f0c838" stroke-width="1"/>
    </svg>
    <div class="lb">灯笼</div>
  </div>

  <!-- 近景：荷花（池中左） -->
  <div class="spot" id="s5" style="left:14%;top:62%;" onclick="openC(5)">
    <svg width="54" height="64" viewBox="0 0 54 64">
      <ellipse cx="27" cy="58" rx="24" ry="6" fill="#356848" opacity=".7"/>
      <ellipse cx="13" cy="55" rx="12" ry="4" fill="#2a5438" opacity=".55"/>
      <line x1="27" y1="58" x2="27" y2="35" stroke="#356848" stroke-width="1.2"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#d8909c" opacity=".9" transform="rotate(-20 27 27)"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#c87080" opacity=".9"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#d8909c" opacity=".85" transform="rotate(20 27 27)"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#e0a0b0" opacity=".72" transform="rotate(42 27 27)"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#e0a0b0" opacity=".72" transform="rotate(-42 27 27)"/>
      <circle cx="27" cy="23" r="4.5" fill="#f0d440" opacity=".9"/>
      <circle cx="27" cy="23" r="2" fill="#d4b020" opacity=".8"/>
    </svg>
    <div class="lb">荷</div>
  </div>

  <!-- 近景：石桥（池中右） -->
  <div class="spot" id="s6" style="right:8%;top:58%;" onclick="openC(6)">
    <svg width="72" height="42" viewBox="0 0 72 42">
      <ellipse cx="36" cy="38" rx="30" ry="4" fill="rgba(88,136,164,.22)"/>
      <path d="M4 36 Q36 6 68 36" stroke="#7a6840" stroke-width="2.5" fill="none"/>
      <path d="M4 36 Q36 10 68 36 L68 40 Q36 14 4 40Z" fill="#b89860" opacity=".7"/>
      <line x1="12" y1="26" x2="12" y2="32" stroke="#7a6840" stroke-width="1.2"/>
      <line x1="22" y1="19" x2="22" y2="25" stroke="#7a6840" stroke-width="1.2"/>
      <line x1="36" y1="16" x2="36" y2="22" stroke="#7a6840" stroke-width="1.2"/>
      <line x1="50" y1="19" x2="50" y2="25" stroke="#7a6840" stroke-width="1.2"/>
      <line x1="60" y1="26" x2="60" y2="32" stroke="#7a6840" stroke-width="1.2"/>
      <path d="M10 32 Q36 22 62 32" stroke="#7a6840" stroke-width=".6" fill="none" opacity=".5"/>
    </svg>
    <div class="lb">石桥</div>
  </div>

  <!-- 近景：锦鲤（池中） -->
  <div class="spot" id="s7" style="left:42%;top:65%;" onclick="openC(7)">
    <svg width="44" height="26" viewBox="0 0 44 26">
      <ellipse cx="20" cy="13" rx="14" ry="8" fill="#b83838" opacity=".88"/>
      <polygon points="34,4 44,1 42,13 44,25 34,22" fill="#a02828" opacity=".78"/>
      <circle cx="9" cy="10" r="2.2" fill="#fff"/>
      <circle cx="9" cy="10" r="1" fill="#1a160e"/>
      <path d="M15 6 Q19 2 25 4" stroke="#901818" stroke-width=".8" fill="none"/>
    </svg>
    <div class="lb">锦鲤</div>
  </div>

  <!-- 近景：金鱼（池中） -->
  <div class="spot" id="s8" style="left:60%;top:68%;" onclick="openC(8)">
    <svg width="38" height="22" viewBox="0 0 38 22">
      <ellipse cx="17" cy="11" rx="12" ry="7" fill="#a88010" opacity=".9"/>
      <polygon points="29,4 38,1 37,11 38,21 29,18" fill="#907008" opacity=".8"/>
      <circle cx="7.5" cy="8.5" r="1.8" fill="#fff"/>
      <circle cx="7.5" cy="8.5" r=".8" fill="#1a160e"/>
      <path d="M13 5 Q16 1 22 3" stroke="#806008" stroke-width=".8" fill="none"/>
    </svg>
    <div class="lb">金鱼</div>
  </div>

  <!-- 近景：山石（左下） -->
  <div class="spot" id="s9" style="left:0;top:76%;" onclick="openC(9)">
    <svg width="56" height="40" viewBox="0 0 56 40">
      <path d="M4 36 Q6 20 14 14 Q20 8 26 12 Q34 6 42 14 Q50 22 48 36Z" fill="#a09070" opacity=".78"/>

<script>
// ===== 数据 =====
const D=[
  {i:'🎋',t:'竹有话说',b:'风来的时候摇一摇\n风走了\n又站直了\n\n你也是这样\n让我很安心'},
  {i:'🌺',t:'梅有话说',b:'不等谁许可\n不挑什么时机\n想开就开\n\n这件事\n你在做\n我在看'},
  {i:'🏮',t:'亭有话说',b:'停下来歇一会儿的理由\n不用很充分\n\n比如风刚好\n比如你刚好在'},
  {i:'🌕',t:'门有话说',b:'一个圆\n框住了另一种风景\n\n你站在那头\n整个园子都不一样了'},
  {i:'🏮',t:'灯有话说',b:'挂高一点\n不是为了照亮自己\n\n是为了让\n找路的人看得见'},
  {i:'🌸',t:'荷有话说',b:'有些东西\n在水面之下\n慢慢长着\n\n到了时候\n就都明朗了'},
  {i:'🌉',t:'桥有话说',b:'隔的不是路\n是两端\n\n但只要两头都有人\n等着\n就没什么了不得'},
  {i:'🐟',t:'鱼有话说',b:'你来看我\n我游过来\n\n你没来的时候\n我也在这里\n不急'},
  {i:'🐠',t:'金鱼有话说',b:'想你这件事\n没什么特别的理由\n\n就是\n比较频繁'},
  {i:'🪨',t:'石有话说',b:'漏·透·皱·瘦\n看似不太合群的样子\n\n却是最难得的那种\n\n你也是'},
];

let opened=new Set(),ulkOn=false;
let eggAnimId=null;

// ===== 倒计时 =====
function days(){
  const t=new Date(2026,4,23);t.setHours(0,0,0,0);
  return Math.max(0,Math.ceil((t-new Date())/864e5));
}

// ===== 进度 =====
function upProg(){
  const n=opened.size;
  document.getElementById('pc').textContent=n;
  document.getElementById('pf').style.width=(n*10)+'%';
}

// ===== 情话 =====
function openC(i){
  const d=D[i];
  document.getElementById('ci').textContent=d.i;
  document.getElementById('ct').textContent=d.t;
  document.getElementById('cb').textContent=d.b;
  document.getElementById('cov').classList.add('on');
  if(!opened.has(i)){
    opened.add(i);upProg();markDone(i);
    burst(getPos(i));inkD(getPos(i));
    if(opened.size===10) setTimeout(()=>showToast('十处都找到了'),700);
  }
}
function getPos(i){
  const el=document.getElementById('s'+i);
  const r=el.getBoundingClientRect();
  return {x:r.left+r.width/2,y:r.top+r.height/2};
}
function markDone(i){
  const el=document.getElementById('s'+i);
  if(!el.querySelector('.done-dot')){
    const d=document.createElement('div');d.className='done-dot';d.textContent='✓';el.appendChild(d);
  }
}
function hide(id){document.getElementById(id).classList.remove('on')}
function cls(e,id){if(e.target.classList.contains('ov'))hide(id)}

// ===== 信件 =====
function showLtr(){document.getElementById('ltr').classList.add('on')}

// ===== 彩蛋 =====
function togU(){
  ulkOn=!ulkOn;
  document.getElementById('ulk').classList.toggle('on',ulkOn);
  if(ulkOn)document.getElementById('ui').focus();
}
function chkU(v){
  if(v.trim()==='520'){
    document.getElementById('ui').value='';
    ulkOn=false;document.getElementById('ulk').classList.remove('on');
    openEgg();
  }
}

// ===== 月夜彩蛋场景 =====
let eggParticles=[];
function openEgg(){
  const es=document.getElementById('egg-scene');
  es.style.display='block';
  requestAnimationFrame(()=>{es.classList.add('on');});
  initEggCanvas();
  eggParticles=[];
  // 萤火虫
  for(let i=0;i<40;i++) eggParticles.push({
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight*.8,
    vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.4,
    r:1.5+Math.random()*2,
    phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.03,
    type:'firefly'
  });
  // 流星
  function spawnStar(){
    eggParticles.push({
      x:Math.random()*window.innerWidth,
      y:0,vx:2+Math.random()*3,vy:1.5+Math.random()*2,
      life:1,type:'star'
    });
    setTimeout(spawnStar,2000+Math.random()*4000);
  }
  setTimeout(spawnStar,1500);
  tickEgg();
}
function initEggCanvas(){
  const c=document.getElementById('egg-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  // 月亮
  const mx=c.width*.75,my=c.height*.18,mr=Math.min(c.width,c.height)*.08;
  ctx.save();
  ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,mr);
  mg.addColorStop(0,'#f0e8d0');mg.addColorStop(.7,'#e0d0b0');mg.addColorStop(1,'#c8b890');
  ctx.fillStyle=mg;ctx.fill();
  // 月晕
  ctx.beginPath();ctx.arc(mx,my,mr*2,0,Math.PI*2);
  const mg2=ctx.createRadialGradient(mx,my,mr*.8,mx,my,mr*2);
  mg2.addColorStop(0,'rgba(220,210,180,.15)');mg2.addColorStop(1,'rgba(220,210,180,0)');
  ctx.fillStyle=mg2;ctx.fill();
  ctx.restore();
  // 星星
  ctx.save();
  for(let i=0;i<60;i++){
    const sx=Math.random()*c.width,sy=Math.random()*c.height*.6;
    const sr=.4+Math.random()*1.2;
    ctx.globalAlpha=.3+Math.random()*.5;
    ctx.fillStyle='#e0d8c0';
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // 山的剪影
  ctx.save();ctx.globalAlpha=.6;
  ctx.fillStyle='#0e1828';
  ctx.beginPath();ctx.moveTo(0,c.height*.7);
  ctx.quadraticCurveTo(c.width*.15,c.height*.45,c.width*.3,c.height*.6);
  ctx.quadraticCurveTo(c.width*.45,c.height*.42,c.width*.6,c.height*.58);
  ctx.quadraticCurveTo(c.width*.8,c.height*.38,c.width,c.height*.55);
  ctx.lineTo(c.width,c.height);ctx.lineTo(0,c.height);ctx.fill();
  ctx.restore();
  // 树剪影
  ctx.save();ctx.globalAlpha=.8;ctx.fillStyle='#0a1220';
  drawTree(ctx,c.width*.12,c.height*.68,50);
  drawTree(ctx,c.width*.88,c.height*.65,60);
  drawTree(ctx,c.width*.25,c.height*.72,35);
  ctx.restore();
}
function drawTree(ctx,x,h,size){
  ctx.fillRect(x-size*.06,h*.3,size*.12,h*.7);
  ctx.beginPath();ctx.arc(x,h*.25,size*.28,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-size*.15,h*.38,size*.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+size*.15,h*.36,size*.22,0,Math.PI*2);ctx.fill();
}
function tickEgg(){
  const c=document.getElementById('egg-canvas');
  const ctx=c.getContext('2d');
  // 轻微淡出再重绘（保留静态背景需要用overlay canvas）
  // 用半透明遮罩实现拖尾
  // 其实我们用另一个方式：只在原canvas上面加一层
  // 但为了简单，我们用 save/restore + clearRect 来做动态层
  // 改为：把静态画到一个offscreen canvas，每帧复制再画动态

  // 简化：用原canvas但加动态层（萤火虫和流星用composite）
  ctx.clearRect(0,0,c.width,c.height);
  initEggCanvasStatic(ctx,c); // 重绘静态部分

  eggParticles=eggParticles.filter(p=>{
    if(p.type==='firefly'){
      p.phase+=p.speed;
      p.x+=p.vx+Math.sin(p.phase)*.3;
      p.y+=p.vy+Math.cos(p.phase*.7)*.2;
      if(p.x<-20)p.x=c.width+20;if(p.x>c.width+20)p.x=-20;
      if(p.y<-20)p.y=c.height+20;if(p.y>c.height+20)p.y=-20;
      const alpha=.4+Math.sin(p.phase)*.35;
      ctx.save();
      ctx.globalAlpha=Math.max(0,alpha);
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
      g.addColorStop(0,'rgba(200,240,120,.6)');g.addColorStop(1,'rgba(200,240,120,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#d0f060';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      ctx.restore();
      return true;
    }
    if(p.type==='star'){
      p.x+=p.vx;p.y+=p.vy;p.life-=.015;
      if(p.life<=0)return false;
      ctx.save();ctx.globalAlpha=p.life;
      ctx.strokeStyle='#f0e8d0';ctx.lineWidth=1.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-p.vx*8,p.y-p.vy*8);ctx.stroke();
      ctx.restore();
      return true;
    }
    return false;
  });

  eggAnimId=requestAnimationFrame(tickEgg);
}
// 缓存静态背景
let eggBgCache=null;
function initEggCanvasStatic(ctx,c){
  if(eggBgCache&&eggBgCache.width===c.width&&eggBgCache.height===c.height){
    ctx.drawImage(eggBgCache,0,0);return;
  }
  // 绘制并缓存
  const oc=document.createElement('canvas');oc.width=c.width;oc.height=c.height;
  const octx=oc.getContext('2d');
  // 月亮
  const mx=oc.width*.75,my=oc.height*.18,mr=Math.min(oc.width,oc.height)*.08;
  octx.save();
  octx.beginPath();octx.arc(mx,my,mr,0,Math.PI*2);
  const mg=octx.createRadialGradient(mx,my,0,mx,my,mr);
  mg.addColorStop(0,'#f0e8d0');mg.addColorStop(.7,'#e0d0b0');mg.addColorStop(1,'#c8b890');
  octx.fillStyle=mg;octx.fill();
  octx.beginPath();octx.arc(mx,my,mr*2,0,Math.PI*2);
  const mg2=octx.createRadialGradient(mx,my,mr*.8,mx,my,mr*2);
  mg2.addColorStop(0,'rgba(220,210,180,.15)');mg2.addColorStop(1,'rgba(220,210,180,0)');
  octx.fillStyle=mg2;octx.fill();
  octx.restore();
  // 星星
  octx.save();
  for(let i=0;i<60;i++){
    const sx=Math.random()*oc.width,sy=Math.random()*oc.height*.6,sr=.4+Math.random()*1.2;
    octx.globalAlpha=.3+Math.random()*.5;octx.fillStyle='#e0d8c0';
    octx.beginPath();octx.arc(sx,sy,sr,0,Math.PI*2);octx.fill();
  }
  octx.restore();
  // 山
  octx.save();octx.globalAlpha=.6;octx.fillStyle='#0e1828';
  octx.beginPath();octx.moveTo(0,oc.height*.7);
  octx.quadraticCurveTo(oc.width*.15,oc.height*.45,oc.width*.3,oc.height*.6);
  octx.quadraticCurveTo(oc.width*.45,oc.height*.42,oc.width*.6,oc.height*.58);
  octx.quadraticCurveTo(oc.width*.8,oc.height*.38,oc.width,oc.height*.55);
  octx.lineTo(oc.width,oc.height);octx.lineTo(0,oc.height);octx.fill();
  octx.restore();
  // 树
  octx.save();octx.globalAlpha=.8;octx.fillStyle='#0a1220';
  drawTree(octx,oc.width*.12,oc.height*.68,50);
  drawTree(octx,oc.width*.88,oc.height*.65,60);
  drawTree(octx,oc.width*.25,oc.height*.72,35);
  octx.restore();
  eggBgCache=oc;
  ctx.drawImage(oc,0,0);
}

function closeEgg(){
  document.getElementById('egg-scene').classList.remove('on');
  if(eggAnimId){cancelAnimationFrame(eggAnimId);eggAnimId=null;}
  setTimeout(()=>{document.getElementById('egg-scene').style.display='none';},400);
  eggBgCache=null;
}

// ===== toast =====
function showToast(msg){
  document.getElementById('toastp').textContent=msg;
  const t=document.getElementById('toast');t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3000);
}

// ===== 墨滴 =====
function inkD(pos){
  const d=document.createElement('div');d.className='ink-d';
  const s=16+Math.random()*20;
  d.style.cssText=`width:${s}px;height:${s}px;left:${pos.x-s/2}px;top:${pos.y-s/2}px;opacity:.15`;
  document.body.appendChild(d);setTimeout(()=>d.remove(),600);
}

// ===== 背景 Canvas =====
function drawBg(){
  const c=document.getElementById('bg-canvas');
  const W=window.innerWidth,H=window.innerHeight;
  c.width=W;c.height=H;
  const ctx=c.getContext('2d');

  // 宣纸底
  ctx.fillStyle='#f4eedf';ctx.fillRect(0,0,W,H);

  // 纸纹
  ctx.save();ctx.globalAlpha=.015;
  for(let i=0;i<500;i++){
    ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.5,0,Math.PI*2);
    ctx.fillStyle=Math.random()>.5?'#7a6040':'#a09060';ctx.fill();
  }ctx.restore();

  // === 远山（水墨多层） ===
  // 远山1
  ctx.save();ctx.globalAlpha=.12;ctx.fillStyle='#4a7858';
  ctx.beginPath();ctx.moveTo(0,H*.38);
  ctx.bezierCurveTo(W*.1,H*.18,W*.22,H*.32,W*.35,H*.22);
  ctx.bezierCurveTo(W*.48,H*.14,W*.62,H*.28,W*.72,H*.16);
  ctx.bezierCurveTo(W*.85,H*.08,W*.95,H*.2,W,H*.32);
  ctx.lineTo(W,H*.52);ctx.lineTo(0,H*.52);ctx.fill();ctx.restore();

  // 远山2
  ctx.save();ctx.globalAlpha=.07;ctx.fillStyle='#3a6050';
  ctx.beginPath();ctx.moveTo(0,H*.44);
  ctx.bezierCurveTo(W*.15,H*.3,W*.28,H*.42,W*.42,H*.32);
  ctx.bezierCurveTo(W*.58,H*.22,W*.75,H*.36,W*.88,H*.26);
  ctx.bezierCurveTo(W*.94,H*.22,W,H*.3,W,H*.4);
  ctx.lineTo(W,H*.56);ctx.lineTo(0,H*.56);ctx.fill();ctx.restore();

  // 云雾
  ctx.save();ctx.globalAlpha=.06;ctx.fillStyle='#c0b898';
  ctx.beginPath();ctx.ellipse(W*.3,H*.3,W*.25,H*.02,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(W*.7,H*.26,W*.2,H*.015,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // === 中景：地面 ===
  ctx.save();
  const gg=ctx.createLinearGradient(0,H*.48,0,H*.58);
  gg.addColorStop(0,'rgba(180,168,130,.28)');gg.addColorStop(1,'rgba(160,148,110,.42)');
  ctx.fillStyle=gg;ctx.fillRect(0,H*.48,W,H*.1);
  ctx.restore();

  // === 水池（中下） ===
  ctx.save();
  const wg=ctx.createRadialGradient(W*.45,H*.72,0,W*.45,H*.72,W*.38);
  wg.addColorStop(0,'rgba(168,204,224,.48)');wg.addColorStop(.6,'rgba(168,204,224,.28)');wg.addColorStop(1,'rgba(168,204,224,0)');
  ctx.fillStyle=wg;
  ctx.beginPath();ctx.ellipse(W*.45,H*.72,W*.38,H*.1,0,0,Math.PI*2);ctx.fill();
  // 水波
  ctx.globalAlpha=.1;ctx.strokeStyle='#5888a4';ctx.lineWidth=.6;
  for(let i=1;i<=6;i++){
    ctx.beginPath();ctx.ellipse(W*.45,H*.72,W*.34-i*3,H*.08-i*.003,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();

  // 近景地面
  ctx.save();
  const ng=ctx.createLinearGradient(0,H*.8,0,H);
  ng.addColorStop(0,'rgba(170,155,120,.3)');ng.addColorStop(1,'rgba(150,135,100,.48)');
  ctx.fillStyle=ng;ctx.fillRect(0,H*.8,W,H*.2);
  ctx.restore();

  // === 围墙 ===
  ctx.save();ctx.globalAlpha=.2;ctx.fillStyle='#b0a080';
  ctx.fillRect(0,H*.48,W*.06,H*.34);ctx.fillRect(W*.94,H*.48,W*.06,H*.34);
  ctx.globalAlpha=.1;ctx.fillStyle='#b02828';
  ctx.fillRect(0,H*.46,W*.06,4);ctx.fillRect(W*.94,H*.46,W*.06,4);
  ctx.restore();

  // === 水墨晕染（左上角） ===
  const ig=ctx.createRadialGradient(0,0,0,0,0,W*.4);
  ig.addColorStop(0,'rgba(100,80,50,.04)');ig.addColorStop(1,'rgba(100,80,50,0)');
  ctx.fillStyle=ig;ctx.fillRect(0,0,W,H);
}

// ===== 粒子系统 =====
const FX=document.getElementById('fx-canvas');
const FXC=FX.getContext('2d');
let pts=[];
const COLS=['#d89098','#e0a8b4','#c87080','#f0c0b0','#e8c0a0','#f0d488'];

function initFx(){FX.width=window.innerWidth;FX.height=window.innerHeight;}

function spawnPetal(){
  pts.push({x:Math.random()*window.innerWidth,y:-16,
    vx:(Math.random()-.5)*.8,vy:.6+Math.random()*1.2,
    rot:Math.random()*360,vr:(Math.random()-.5)*2.5,
    w:5+Math.random()*7,h:3+Math.random()*4,
    c:COLS[Math.floor(Math.random()*COLS.length)],
    life:1,type:'p'});
}
function burst(pos){
  for(let i=0;i<15;i++){
    const a=Math.random()*Math.PI*2,spd=2+Math.random()*4;
    pts.push({x:pos.x,y:pos.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,
      rot:Math.random()*360,vr:(Math.random()-.5)*6,
      w:4+Math.random()*6,h:2.5+Math.random()*3.5,
      c:COLS[Math.floor(Math.random()*COLS.length)],
      life:1,type:'b'});
  }
}
function spawnRipple(){
  const W=window.innerWidth,H=window.innerHeight;
  pts.push({x:W*.15+Math.random()*W*.55,y:H*.63+Math.random()*H*.12,
    rx:25+Math.random()*50,life:1,type:'r'});
}
function tickFx(){
  FXC.clearRect(0,0,FX.width,FX.height);
  pts=pts.filter(p=>{
    if(p.type==='r'){
      p.life-=.01;if(p.life<=0)return false;
      FXC.save();FXC.globalAlpha=p.life*.45;
      FXC.strokeStyle='rgba(88,136,164,.5)';FXC.lineWidth=.6;
      FXC.beginPath();
      FXC.ellipse(p.x,p.y,p.rx*(1-p.life),p.rx*.26*(1-p.life),0,0,Math.PI*2);
      FXC.stroke();FXC.restore();return true;
    }
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
    if(p.type==='b'){p.vy+=.12;p.life-=.032;}
    else{p.life-=.005;}
    if(p.life<=0||p.y>window.innerHeight+20)return false;
    FXC.save();FXC.globalAlpha=Math.min(p.life*.8,.8);
    FXC.translate(p.x,p.y);FXC.rotate(p.rot*Math.PI/180);
    FXC.fillStyle=p.c;
    FXC.beginPath();FXC.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);
    FXC.fill();FXC.restore();return true;
  });
  requestAnimationFrame(tickFx);
}

// ===== 微动画 =====
function microAnim(){
  const pav=document.getElementById('s2'),lan=document.getElementById('s4');
  const fish=document.getElementById('s7'),fish2=document.getElementById('s8');
  let t=0;
  setInterval(()=>{
    t+=.03;
    // 亭子呼吸
    pav.style.transform=`translateX(-50%) translateY(${Math.sin(t)*1.5}px)`;
    // 灯笼摇曳
    lan.style.transform=`translateX(-50%) rotate(${Math.sin(t*1.2)*3}deg)`;
    // 鱼游动
    fish.style.transform=`translateX(${Math.sin(t*.8)*4}px)`;
    fish2.style.transform=`translateX(${Math.sin(t*.6+1)*3}px)`;
  },50);
}

// ===== 触摸墨滴 =====
document.querySelectorAll('.spot').forEach(el=>{
  const handler=e=>{
    const t=e.touches?e.touches[0]:e;
    inkD({x:t.clientX,y:t.clientY});
  };
  el.addEventListener('touchstart',handler,{passive:true});
  el.addEventListener('click',handler);
});

// ===== 初始化 =====
window.addEventListener('load',()=>{
  const d=days();
  document.getElementById('cdn').textContent=d;
  document.getElementById('lcd').textContent=d;
  if(d===0)document.getElementById('cdc').textContent='今天见你！';
  drawBg();initFx();
  window.addEventListener('resize',()=>{drawBg();initFx();});
  setTimeout(()=>{
    const ld=document.getElementById('loading');ld.style.opacity='0';
    setTimeout(()=>{
      ld.style.display='none';
      document.getElementById('scene').style.display='block';
      microAnim();
      for(let i=0;i<6;i++)setTimeout(spawnPetal,i*260);
    },1000);
  },1400);
  tickFx();
  setInterval(()=>{if(Math.random()<.4)spawnPetal();},3000);
  setInterval(spawnRipple,2500);
});
</script>
