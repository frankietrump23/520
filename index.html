<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>萌萌的园子 · 五月二十日</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a160e;--ink-m:#5c4a2e;--ink-l:#9a8060;
  --paper:#f4eedf;--paper-w:#ece3d0;
  --red:#b02828;--red-s:#cc3e3e;--red-l:#e8b0a0;
  --jade:#356848;--jade-l:#6aa070;
  --gold:#a88010;--gold-l:#d4b440;
  --water:#5888a4;--water-l:#a8cce0;
  --lotus:#c85870;
}
html,body{width:100%;height:100%;overflow:hidden;background:#87CEEB;
  font-family:'Noto Serif SC','STSong','STKaiti','SimSun',serif;color:var(--ink);user-select:none}

/* ===== loading ===== */
#loading{position:fixed;inset:0;z-index:300;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity 1s}
.ink-drop{width:52px;height:52px;border-radius:50%;background:var(--ink);
  animation:idp 1.6s ease-in-out infinite;position:relative;overflow:hidden}
.ink-drop::after{content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,rgba(255,255,255,.2),transparent 60%)}
@keyframes idp{0%,100%{transform:scale(.82);opacity:.65}50%{transform:scale(1.06);opacity:1}}
#loading p{font-size:13px;color:var(--ink-m);letter-spacing:5px}

/* ===== main scene ===== */
#scene{position:relative;width:100%;height:100vh;overflow:hidden;display:none}
#main-cvs{position:absolute;inset:0;width:100%;height:100%;touch-action:none}

/* ===== header ===== */
#hdr{position:absolute;top:0;left:0;right:0;text-align:center;
  padding:18px 16px 0;pointer-events:none;z-index:10;
  background:linear-gradient(to bottom,rgba(175,215,240,.82) 50%,transparent)}
#hdr .dt{font-size:11px;color:#4a4540;letter-spacing:5px;text-shadow:0 1px 6px rgba(255,255,255,0.85)}
#hdr h1{font-size:21px;font-weight:600;color:#2a2520;letter-spacing:10px;
  margin-top:5px;text-shadow:0 1px 8px rgba(255,255,255,0.5)}
#hdr .sub{font-size:11px;color:#4a4540;letter-spacing:2px;margin-top:3px;
  text-shadow:0 1px 4px rgba(255,255,255,0.7)}

/* ===== countdown ===== */
#cd{position:absolute;top:86px;right:12px;z-index:10;
  background:rgba(244,238,223,.78);border:.5px solid rgba(168,128,16,.35);
  border-radius:6px;padding:6px 12px;text-align:center;backdrop-filter:blur(6px)}
#cd .n{font-size:24px;font-weight:600;color:var(--red);line-height:1}
#cd .c{font-size:11px;color:#4a4540;letter-spacing:1px;margin-top:1px}

/* ===== progress ===== */
#prog{position:absolute;top:86px;left:12px;z-index:10;
  font-size:11px;color:#2a2520;letter-spacing:1px;pointer-events:none;
  text-shadow:0 1px 5px rgba(255,255,255,0.75)}
#pb{width:52px;height:2px;background:rgba(0,0,0,.08);border-radius:1px;margin-top:4px;overflow:hidden}
#pf{height:100%;background:var(--red);border-radius:1px;width:0;transition:width .5s}

/* ===== scenic spots ===== */
.spot{position:absolute;cursor:pointer;z-index:5;
  transition:transform .2s cubic-bezier(.34,1.4,.64,1)}
.spot:active{transform:scale(.88)!important}
.spot svg{display:block;transform:scale(.58);transform-origin:center center;
  filter:drop-shadow(0 2px 8px rgba(26,22,14,.1));opacity:.82}
.spot .lb{text-align:center;font-size:12px;color:#fff;letter-spacing:2px;margin-top:2px;
  opacity:.92;transition:opacity .3s;text-shadow:0 0 8px rgba(0,0,0,0.5),0 1px 3px rgba(255,255,255,0.9)}
.spot:hover .lb{opacity:1}
.spot .hint{position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  background:rgba(176,40,40,.08);border:.5px solid rgba(176,40,40,.3);
  border-radius:3px;padding:2px 8px;font-size:10px;color:var(--red);
  white-space:nowrap;animation:hf 2s ease-in-out infinite;pointer-events:none}
@keyframes hf{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
.done-dot{position:absolute;top:-4px;right:-4px;width:14px;height:14px;
  background:var(--red);border-radius:50%;font-size:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;z-index:6;
  animation:dotPop .3s cubic-bezier(.34,1.5,.64,1)}
@keyframes dotPop{from{transform:scale(0)}}

/* ===== bottom bar ===== */
#bar{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 26px;
  display:flex;gap:10px;align-items:center;justify-content:center;
  background:linear-gradient(to top,rgba(190,210,170,.82) 50%,transparent);z-index:10}
.btn{background:rgba(244,238,223,.75);border:.5px solid #9a8a70;border-radius:3px;
  padding:8px 18px;font-family:inherit;font-size:13px;color:#2a2520;
  letter-spacing:3px;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.btn:active{background:var(--ink);color:var(--paper)}
.btn.r{border-color:var(--red);color:var(--red)}
.btn.r:active{background:var(--red);color:#fff}

/* ===== unlock input ===== */
#ulk{position:absolute;bottom:78px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;pointer-events:none;transition:opacity .4s;z-index:20}
#ulk.on{opacity:1;pointer-events:all}
#ulk p{font-size:13px;color:#3d352a;letter-spacing:3px;font-weight:500;
  text-shadow:0 1px 8px rgba(255,255,255,1),0 0 12px rgba(255,255,255,.6)}
#ulk input{width:100px;background:rgba(244,238,223,.6);border:none;
  border-bottom:1px solid #9a8a70;outline:none;font-family:inherit;
  font-size:20px;text-align:center;color:var(--red);letter-spacing:10px;padding:3px 6px;
  border-radius:4px 4px 0 0}

/* ===== overlays ===== */
.ov{position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .35s}
.ov.on{opacity:1;pointer-events:all}

/* ===== card ===== */
.card{background:var(--paper);border-radius:2px;width:100%;max-width:310px;
  padding:32px 26px 24px;position:relative;
  transform:scale(.84) translateY(20px);
  transition:transform .4s cubic-bezier(.34,1.5,.64,1);
  box-shadow:0 4px 28px rgba(26,22,14,.18)}
.ov.on .card{transform:scale(1) translateY(0)}
.card::before,.card::after{content:'';position:absolute;
  width:16px;height:16px;border-color:rgba(176,40,40,.3);border-style:solid}
.card::before{top:8px;left:8px;border-width:1px 0 0 1px}
.card::after{bottom:8px;right:8px;border-width:0 1px 1px 0}
.card .x{position:absolute;top:8px;right:12px;font-size:20px;
  color:var(--ink-m);cursor:pointer;background:none;border:none;font-family:inherit}
.card .ico{text-align:center;font-size:28px;margin-bottom:12px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.08))}
.card .ttl{font-size:12px;color:var(--ink-m);letter-spacing:4px;text-align:center;margin-bottom:16px}
.card .bdy{font-size:15px;line-height:2.1;color:var(--ink);text-align:center;
  white-space:pre-line;min-height:68px;letter-spacing:.5px}
.card .ft{margin-top:16px;font-size:11px;color:var(--ink-m);text-align:center;letter-spacing:1px}

/* ===== letter ===== */
#ltr .card{max-width:340px;padding:34px 28px 26px}
.lhd{text-align:center;margin-bottom:20px}
.seal{display:inline-block;width:36px;height:36px;border:1.5px solid var(--red);
  border-radius:3px;color:var(--red);font-size:13px;font-weight:600;
  line-height:36px;text-align:center;margin-bottom:8px;
  animation:sg 3s ease-in-out infinite}
@keyframes sg{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 0 4px rgba(176,40,40,.1)}}
.lhd h2{font-size:16px;font-weight:600;letter-spacing:6px;color:var(--ink)}
.lbdy{font-size:14px;line-height:2.4;color:var(--ink);
  border-top:.5px solid var(--paper-w);padding-top:16px;white-space:pre-line;letter-spacing:.5px}
.lft{margin-top:20px;text-align:right;font-size:11px;color:var(--ink-m);letter-spacing:1px}

/* ===== easter egg: moon night ===== */
#egg-scene{position:fixed;inset:0;z-index:150;display:none;
  background:linear-gradient(to bottom,#0a0e18 0%,#141e30 40%,#1a2840 70%,#0e1828 100%)}
#egg-canvas{position:absolute;inset:0;width:100%;height:100%}
#egg-content{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:5;padding:20px}
#egg-poem{color:rgba(230,220,200,.92);font-size:17px;line-height:2.4;
  text-align:center;letter-spacing:2px;opacity:0;
  transform:translateY(20px);transition:all 1s .5s}
#egg-scene.on #egg-poem{opacity:1;transform:translateY(0)}
#egg-close{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:10;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.15);
  border-radius:20px;padding:6px 20px;color:rgba(255,255,255,.5);font-family:inherit;
  font-size:12px;letter-spacing:2px;cursor:pointer}
#egg-close:active{background:rgba(255,255,255,.15)}

/* ===== completion celebration ===== */
#celeb{position:fixed;inset:0;z-index:250;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);pointer-events:none;transition:background .6s}
#celeb.on{display:flex;background:rgba(30,25,20,0.35);pointer-events:auto}
#celeb-card{transform:translate(-50%,-50%) scale(.6) rotate(-3deg);opacity:0;
  transition:transform .7s cubic-bezier(.34,1.56,.64,1),opacity .5s;
  background:linear-gradient(135deg,#faf6ee,#f4eedf);border:1px solid var(--gold);
  border-radius:14px;padding:32px 36px 28px;text-align:center;position:relative;
  box-shadow:0 8px 40px rgba(180,140,60,0.18),0 0 0 4px rgba(168,128,16,0.08);
  max-width:280px}
#celeb.on #celeb-card{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;
  position:absolute;top:50%;left:50%}
#celeb-card::before{content:'';position:absolute;inset:-6px;border-radius:18px;
  background:linear-gradient(135deg,rgba(168,128,16,0.1),rgba(200,100,80,0.08));z-index:-1}
.celeb-hearts{position:relative;width:60px;height:60px;margin:0 auto 12px}
.celeb-heart{position:absolute;font-size:22px;opacity:0;
  animation:heartPop .5s ease-out forwards}
.celeb-heart:nth-child(1){left:50%;top:50%;animation-delay:.1s;font-size:28px}
.celeb-heart:nth-child(2){left:5px;top:10px;animation-delay:.3s;font-size:16px}
.celeb-heart:nth-child(3){right:5px;top:10px;animation-delay:.4s;font-size:18px}
.celeb-heart:nth-child(4){left:0;bottom:5px;animation-delay:.5s;font-size:14px}
.celeb-heart:nth-child(5){right:0;bottom:5px;animation-delay:.6s;font-size:15px}
@keyframes heartPop{0%{opacity:0;transform:scale(0) translateY(10px)}
  50%{opacity:1;transform:scale(1.2) translateY(-5px)}
  100%{opacity:1;transform:scale(1) translateY(0)}}
#celeb-title{font-size:18px;color:var(--red);letter-spacing:3px;margin-bottom:6px;font-weight:600}
#celeb-sub{font-size:13px;color:var(--ink-m);letter-spacing:1.5px;line-height:1.8}
#celeb-dismiss{margin-top:18px;font-size:12px;color:var(--ink-l);cursor:pointer;
  letter-spacing:1px;opacity:.7;transition:opacity .2s;pointer-events:auto;
  background:none;border:none;font-family:inherit}
#celeb-dismiss:hover{opacity:1}
/* celeb floating petals */
.celeb-petal{position:fixed;pointer-events:none;z-index:249;border-radius:50%;
  opacity:0;animation:petalFall var(--dur,3s) var(--delay,0s) ease-in forwards}
@keyframes petalFall{
  0%{opacity:0;transform:translateY(-20px) rotate(0deg) scale(.5)}
  15%{opacity:.8}
  85%{opacity:.6}
  100%{opacity:0;transform:translateY(100vh) rotate(360deg) scale(.3)}
}

/* ===== toast ===== */
#toast{position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.7);z-index:200;
  background:var(--paper);border:.5px solid var(--gold);
  border-radius:8px;padding:20px 32px;text-align:center;
  opacity:0;transition:transform .4s cubic-bezier(.34,1.5,.64,1),opacity .3s;pointer-events:none}
#toast.on{transform:translate(-50%,-50%) scale(1);opacity:1}
#toast p{font-size:14px;color:var(--ink);margin-top:8px;letter-spacing:2px}

/* ===== ink drop ===== */
.ink-d{position:fixed;pointer-events:none;z-index:45;border-radius:50%;
  background:var(--ink);animation:ids .5s ease-out forwards}
@keyframes ids{0%{transform:scale(0);opacity:.6}60%{transform:scale(1.3);opacity:.2}100%{transform:scale(1.6);opacity:0}}
</style>
</head>
<body>

<div id="loading"><div class="ink-drop"></div><p>铺纸研墨…</p></div>

<div id="scene">
  <canvas id="main-cvs"></canvas>

  <div id="hdr">
    <div class="dt">二〇二六 · 五月 · 二十日</div>
    <h1>萌萌的小园子</h1>
    <div class="sub">轻触园中，有话藏在这里</div>
  </div>
  <div id="cd"><div class="n" id="cdn">3</div><div class="c" id="cdc">天后见你</div></div>
  <div id="prog">已寻得 <span id="pc">0</span>/10<div id="pb"><div id="pf"></div></div></div>

  <!-- ===== 10 scenic spots ===== -->

  <!-- 0: Bamboo — 竹林右侧，贴近竹子实际位置 -->
  <div class="spot" id="s0" style="left:82%;top:32%;" onclick="openC(0)">
    <svg width="48" height="88" viewBox="0 0 48 88">
      <rect x="16" y="2" width="6" height="82" rx="3" fill="#4a7a40"/>
      <rect x="25" y="10" width="5" height="72" rx="2.5" fill="#3c6c34"/>
      <rect x="9" y="16" width="4" height="64" rx="2" fill="#5a8a50"/>
      <line x1="15" y1="26" x2="23" y2="26" stroke="#2e5428" stroke-width=".8"/>
      <line x1="15" y1="50" x2="23" y2="50" stroke="#2e5428" stroke-width=".8"/>
      <line x1="15" y1="72" x2="23" y2="72" stroke="#2e5428" stroke-width=".8"/>
      <line x1="24" y1="36" x2="31" y2="36" stroke="#2e5428" stroke-width=".8"/>
      <line x1="24" y1="58" x2="31" y2="58" stroke="#2e5428" stroke-width=".8"/>
      <ellipse cx="14" cy="8" rx="10" ry="3" fill="#3c6c34" transform="rotate(-26 14 8)"/>
      <ellipse cx="30" cy="5" rx="8" ry="2.5" fill="#5a8a50" transform="rotate(22 30 5)"/>
      <ellipse cx="9" cy="14" rx="7" ry="2.2" fill="#5a8a50" transform="rotate(-40 9 14)"/>
    </svg>
    <div class="lb">竹</div>
  </div>

  <!-- 1: Cherry Blossom — 两棵樱花树之间的草地，偏左中部 -->
  <div class="spot" id="s1" style="left:35%;top:52%;" onclick="openC(1)">
    <svg width="50" height="65" viewBox="0 0 50 65">
      <path d="M25 62 Q22 46 18 28 Q24 20 28 14" stroke="#5c3c20" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M25 44 Q32 36 40 30" stroke="#5c3c20" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M21 34 Q14 28 10 20" stroke="#5c3c20" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <g transform="translate(26 12)"><circle cx="0" cy="-6" r="3.8" fill="#d89098"/><circle cx="5.7" cy="-1.9" r="3.8" fill="#e0a0a8"/><circle cx="3.5" cy="4.9" r="3.8" fill="#d89098"/><circle cx="-3.5" cy="4.9" r="3.8" fill="#e0a0a8"/><circle cx="-5.7" cy="-1.9" r="3.8" fill="#d89098"/><circle cx="0" cy="0" r="2.8" fill="#e8c840"/></g>
      <g transform="translate(40 28)"><circle cx="0" cy="-4.8" r="2.8" fill="#d89098"/><circle cx="4.6" cy="-1.5" r="2.8" fill="#e0a0a8"/><circle cx="2.8" cy="3.8" r="2.8" fill="#d89098"/><circle cx="-2.8" cy="3.8" r="2.8" fill="#e0a0a8"/><circle cx="-4.6" cy="-1.5" r="2.8" fill="#d89098"/><circle cx="0" cy="0" r="2" fill="#e8c840"/></g>
      <g transform="translate(10 18)"><circle cx="0" cy="-5" r="3.2" fill="#e0a0a8"/><circle cx="4.8" cy="-1.5" r="3.2" fill="#d89098"/><circle cx="3" cy="4" r="3.2" fill="#e0a0a8"/><circle cx="-3" cy="4" r="3.2" fill="#d89098"/><circle cx="-4.8" cy="-1.5" r="3.2" fill="#e0a0a8"/><circle cx="0" cy="0" r="2.2" fill="#e8c840"/></g>
    </svg>
    <div class="lb">花</div>
  </div>

  <!-- 2: Pavilion — 点击Canvas大亭子 -->
  <div class="spot" id="s2" style="left:73%;top:46%;width:11%;height:16%;background:transparent;" onclick="openC(2)">
    <div class="lb">亭</div>
  </div>

  <!-- 3: Stone Path — 石板小路，左侧草地偏下 -->
  <div class="spot" id="s3" style="left:12%;top:64%;" onclick="openC(3)">
    <svg width="50" height="66" viewBox="0 0 50 66">
      <ellipse cx="25" cy="14" rx="8" ry="4.5" fill="#b8a888" opacity=".7"/>
      <ellipse cx="20" cy="24" rx="7" ry="4" fill="#c4b498" opacity=".75"/>
      <ellipse cx="28" cy="33" rx="8" ry="4.2" fill="#b8a888" opacity=".7"/>
      <ellipse cx="22" cy="42" rx="7.5" ry="4" fill="#c4b498" opacity=".75"/>
      <ellipse cx="27" cy="51" rx="8" ry="4.5" fill="#b8a888" opacity=".7"/>
      <line x1="14" y1="22" x2="12" y2="26" stroke="#5a8a50" stroke-width="1" stroke-linecap="round"/>
      <line x1="16" y1="30" x2="14" y2="34" stroke="#4a7a40" stroke-width=".8" stroke-linecap="round"/>
      <line x1="35" y1="40" x2="37" y2="44" stroke="#5a8a50" stroke-width=".9" stroke-linecap="round"/>
      <line x1="18" y1="48" x2="15" y2="52" stroke="#4a7a40" stroke-width=".8" stroke-linecap="round"/>
    </svg>
    <div class="lb">径</div>
  </div>

  <!-- 4: Lantern — 跟随亭子移至草坪区域 -->
  <div class="spot" id="s4" style="left:79%;top:57%;" onclick="openC(4)">
    <svg width="28" height="52" viewBox="0 0 28 52">
      <line x1="14" y1="0" x2="14" y2="6" stroke="#7a6038" stroke-width=".8"/>
      <path d="M4 10 Q1 20 1 27 Q1 36 4 44L24 44 Q27 36 27 27 Q27 20 24 10Z" fill="#b02828" opacity=".92"/>
      <ellipse cx="14" cy="10" rx="10" ry="2.5" fill="#801010"/>
      <ellipse cx="14" cy="44" rx="10" ry="2.5" fill="#801010"/>
      <ellipse cx="14" cy="27" rx="6" ry="8" fill="#f0c838" opacity=".22"/>
      <line x1="8" y1="12" x2="7" y2="42" stroke="#801010" stroke-width=".4" opacity=".35"/>
      <line x1="20" y1="12" x2="21" y2="42" stroke="#801010" stroke-width=".4" opacity=".35"/>
      <line x1="11" y1="46" x2="9" y2="52" stroke="#f0c838" stroke-width="1"/>
      <line x1="14" y1="46" x2="14" y2="52" stroke="#f0c838" stroke-width="1"/>
      <line x1="17" y1="46" x2="19" y2="52" stroke="#f0c838" stroke-width="1"/>
    </svg>
    <div class="lb">灯</div>
  </div>

  <!-- 5: Lotus — 池塘左侧荷花处，pondCX≈47%, pondCY≈70%，left偏左 -->
  <div class="spot" id="s5" style="left:32%;top:65%;" onclick="openC(5)">
    <svg width="54" height="64" viewBox="0 0 54 64">
      <ellipse cx="27" cy="58" rx="24" ry="6" fill="#356848" opacity=".7"/>
      <ellipse cx="13" cy="55" rx="12" ry="4" fill="#2a5438" opacity=".55"/>
      <line x1="27" y1="58" x2="27" y2="35" stroke="#356848" stroke-width="1.2"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#d8909c" opacity=".9" transform="rotate(-20 27 27)"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#c87080" opacity=".9"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#d8909c" opacity=".85" transform="rotate(20 27 27)"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#e0a0b0" opacity=".72" transform="rotate(42 27 27)"/>
      <ellipse cx="27" cy="27" rx="5" ry="12" fill="#e0a0b0" opacity=".72" transform="rotate(-42 27 27)"/>
      <circle cx="27" cy="23" r="4.5" fill="#f0d440" opacity=".9"/>
      <circle cx="27" cy="23" r="2" fill="#d4b020" opacity=".8"/>
    </svg>
    <div class="lb">荷</div>
  </div>

<script>
// ===========================================================
//  PART 1 — Canvas 2D Garden Drawing (from V7.1)
// ===========================================================
const cv = document.getElementById('main-cvs'), ctx = cv.getContext('2d');
let W, H, dpr = Math.min(devicePixelRatio || 1, 2), time = 0;
let groundY;

// ===== Seeded Random =====
let _s = 42;
function srand(v) { _s = v | 0; }
function rand() { _s = (_s * 16807) % 2147483647; return (_s - 1) / 2147483646; }
function rr(a, b) { return a + rand() * (b - a); }
function ri(a, b) { return Math.floor(rr(a, b)); }

// ===== Scene Data =====
let clouds = [], petals = [], butterflies = [], ripples = [];
let bamboos = [], rocks = [], flowers = [], grassBlades = [];
let distantTrees = [];
let pondCX, pondCY, pondRX, pondRY;
let tree1 = {}, tree2 = {};

function regenerate() {
  srand(42);
  groundY = H * 0.6;
  pondCX = W * 0.47; pondCY = H * 0.7; pondRX = W * 0.2; pondRY = H * 0.1;
  tree1 = { x: W * 0.16, y: groundY + H * 0.02, scale: 1.15 };
  tree2 = { x: W * 0.62, y: groundY - H * 0.03, scale: 0.95 };
  clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({ x: rr(-W*0.1,W*1.1), y: rr(H*0.04,H*0.22), w: rr(W*0.08,W*0.18), h: rr(H*0.018,H*0.04), speed: rr(0.12,0.35), puffs: [] });
    let c = clouds[i], n = ri(4,7);
    for (let j = 0; j < n; j++) c.puffs.push({ ox: rr(-0.4,0.4), oy: rr(-0.3,0.3), rx: rr(0.25,0.5), ry: rr(0.3,0.6) });
  }
  petals = []; for (let i = 0; i < 50; i++) petals.push(newPetal());
  butterflies = []; for (let i = 0; i < 3; i++) butterflies.push(newButterfly(i));
  distantTrees = []; srand(333);
  for (let i = 0; i < 20; i++) distantTrees.push({ x: rr(W*-0.02,W*1.02), y: H*0.38+Math.sin(i*0.7)*H*0.04+rr(-H*0.01,H*0.01), h: rr(H*0.03,H*0.07), w: rr(W*0.01,W*0.025), shade: rr(0,1) });
  bamboos = [];
  [{ cx:W*0.84,cy:groundY-H*0.01,n:5 },{ cx:W*0.89,cy:groundY-H*0.04,n:4 },{ cx:W*0.935,cy:groundY+H*0.01,n:4 }].forEach(cl=>{
    for(let j=0;j<cl.n;j++){let b={x:cl.cx+rr(-W*0.012,W*0.012),baseY:cl.cy+rr(-H*0.005,H*0.005),h:rr(H*0.18,H*0.38),thick:rr(2,5),phase:rr(0,Math.PI*2),swayAmp:rr(1.5,3.5),leaves:[]};let lc=ri(8,14);for(let k=0;k<lc;k++){let t=rr(0.12,0.88),side=rand()>0.5?1:-1;b.leaves.push({t,side,len:rr(14,32),angle:side*rr(0.3,0.9),phase:rr(0,Math.PI*2),width:rr(4,8)})}bamboos.push(b)}
  });
  rocks = [];
  [{x:W*0.33,y:groundY+H*0.04},{x:W*0.38,y:groundY+H*0.06},{x:W*0.43,y:groundY+H*0.02},{x:W*0.56,y:groundY+H*0.05},{x:W*0.60,y:groundY+H*0.03}].forEach(rp=>{
    let r={x:rp.x,y:rp.y,w:rr(20,45),h:rr(18,42),hue:rr(28,48),sat:rr(12,28),lit:rr(58,72),shape:[],holes:[]};
    let pts=ri(10,16);for(let i=0;i<pts;i++){let a=(i/pts)*Math.PI*2;r.shape.push({a,r:rr(0.55,1)})}
    let nh=ri(1,3);for(let j=0;j<nh;j++)r.holes.push({cx:rr(-0.25,0.25),cy:rr(-0.25,0.25),rx:rr(0.06,0.16),ry:rr(0.08,0.2)});
    rocks.push(r);
  });
  flowers = [];
  for(let i=0;i<35;i++){let fx=rr(W*0.03,W*0.97),fy=groundY+rr(H*0.04,H*0.25);let dx=(fx-pondCX)/pondRX,dy=(fy-pondCY)/pondRY;if(dx*dx+dy*dy<1.3)continue;flowers.push({x:fx,y:fy,size:rr(2.5,6),color:['#FFB7C5','#FFD700','#FF85A2','#DDA0DD','#F0E68C','#FF6B6B','#87CEEB'][ri(0,7)],phase:rr(0,Math.PI*2),petals:ri(4,6)})}
  grassBlades = []; srand(777);
  for(let i=0;i<100;i++) grassBlades.push({x:rr(0,W),y:H*0.82+rr(0,H*0.18),h:rr(8,22),w:rr(0.8,2),g:ri(100,175),phase:rr(0,Math.PI*2)});
  ripples = [];
}

function newPetal(){let from=rand()>0.5?tree1:tree2;return{x:from.x+rr(-70,70),y:from.y+rr(-60,20),vx:rr(-0.4,0.4),vy:rr(0.25,0.7),rot:rr(0,Math.PI*2),rotV:rr(-0.015,0.015),size:rr(2.5,6.5),alpha:rr(0.5,0.85),pink:rand()>0.3,swayPh:rr(0,Math.PI*2),swayAmp:rr(0.3,0.9),life:0,maxLife:rr(250,600)}}
function newButterfly(idx){let cx=W*(0.25+idx*0.22),cy=H*(0.42+idx*0.08);return{cx,cy,angle:rr(0,Math.PI*2),rx:rr(35,70),ry:rr(15,35),speed:rr(0.006,0.013),wingPh:rr(0,Math.PI*2),wingSpd:rr(0.07,0.11),x:cx,y:cy,size:rr(5,9),c1:['#FFB347','#FF85A2','#87CEEB'][idx],c2:['#FF6347','#E06090','#5F9EA0'][idx],dir:1}}

function drawSky(){let g=ctx.createLinearGradient(0,0,0,groundY+H*0.1);g.addColorStop(0,'#4BA3D4');g.addColorStop(0.15,'#6BB8E0');g.addColorStop(0.35,'#8ECAE6');g.addColorStop(0.55,'#B0DAF0');g.addColorStop(0.75,'#D0E8F5');g.addColorStop(1,'#E4F3FA');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}
function drawSun(){let sx=W*0.15,sy=H*0.1,sr=Math.min(W,H)*0.065;let g0=ctx.createRadialGradient(sx,sy,sr,sx,sy,sr*6);g0.addColorStop(0,'rgba(255,250,210,0.25)');g0.addColorStop(0.3,'rgba(255,245,190,0.1)');g0.addColorStop(1,'rgba(255,245,190,0)');ctx.fillStyle=g0;ctx.fillRect(sx-sr*6,sy-sr*6,sr*12,sr*12);let g1=ctx.createRadialGradient(sx,sy,sr*0.5,sx,sy,sr*3);g1.addColorStop(0,'rgba(255,248,200,0.45)');g1.addColorStop(0.5,'rgba(255,240,170,0.15)');g1.addColorStop(1,'rgba(255,240,170,0)');ctx.fillStyle=g1;ctx.fillRect(sx-sr*3,sy-sr*3,sr*6,sr*6);ctx.save();ctx.translate(sx,sy);ctx.rotate(time*0.0003);ctx.globalAlpha=0.06;for(let i=0;i<12;i++){let a=(i/12)*Math.PI*2;ctx.fillStyle='#FFF8D0';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a-0.04)*sr*4.5,Math.sin(a-0.04)*sr*4.5);ctx.lineTo(Math.cos(a+0.04)*sr*4.5,Math.sin(a+0.04)*sr*4.5);ctx.closePath();ctx.fill()}ctx.restore();let g2=ctx.createRadialGradient(sx-sr*0.08,sy-sr*0.08,0,sx,sy,sr);g2.addColorStop(0,'#FFFFF0');g2.addColorStop(0.5,'#FFF8D0');g2.addColorStop(0.85,'#FFE890');g2.addColorStop(1,'rgba(255,220,100,0.15)');ctx.fillStyle=g2;ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill()}
function drawClouds(){clouds.forEach(c=>{c.x+=c.speed;if(c.x-c.w*0.5>W+50)c.x=-c.w;ctx.save();ctx.globalAlpha=0.75;c.puffs.forEach(p=>{let px=c.x+p.ox*c.w,py=c.y+p.oy*c.h,prx=p.rx*c.w,pry=p.ry*c.h;ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.ellipse(px,py,prx,pry,0,0,Math.PI*2);ctx.fill()});ctx.restore()})}
function drawDistantMountains(){ctx.fillStyle='rgba(140,185,220,0.35)';ctx.beginPath();ctx.moveTo(-20,H*0.5);for(let x=-20;x<=W+20;x+=2){let y=H*0.38+Math.sin(x*0.0025)*H*0.05+Math.sin(x*0.006+1.5)*H*0.025+Math.sin(x*0.0012)*H*0.035;ctx.lineTo(x,y)}ctx.lineTo(W+20,H*0.55);ctx.lineTo(-20,H*0.55);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(110,180,140,0.3)';ctx.beginPath();ctx.moveTo(-20,H*0.52);for(let x=-20;x<=W+20;x+=2){let y=H*0.43+Math.sin(x*0.004+2)*H*0.035+Math.sin(x*0.01+0.5)*H*0.015;ctx.lineTo(x,y)}ctx.lineTo(W+20,H*0.58);ctx.lineTo(-20,H*0.58);ctx.closePath();ctx.fill()}
function drawDistantTreeSilhouettes(){ctx.save();distantTrees.forEach(t=>{let alpha=0.25+t.shade*0.15;ctx.fillStyle=`rgba(60,130,75,${alpha})`;ctx.beginPath();ctx.moveTo(t.x,t.y);ctx.lineTo(t.x-t.w,t.y+t.h);ctx.lineTo(t.x+t.w,t.y+t.h);ctx.closePath();ctx.fill();ctx.fillStyle=`rgba(80,70,50,${alpha*0.7})`;ctx.fillRect(t.x-1,t.y+t.h,2,t.h*0.3)});ctx.restore()}
function drawGround(){let g=ctx.createLinearGradient(0,groundY,0,H);g.addColorStop(0,'#8BC34A');g.addColorStop(0.12,'#7CB840');g.addColorStop(0.3,'#6DA835');g.addColorStop(0.55,'#5E9A2A');g.addColorStop(0.8,'#4E8C22');g.addColorStop(1,'#3D7A18');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(-20,groundY);for(let x=-20;x<=W+20;x+=2){let y=groundY+Math.sin(x*0.003+0.5)*H*0.015+Math.sin(x*0.008)*H*0.008;ctx.lineTo(x,y)}ctx.lineTo(W+20,H+20);ctx.lineTo(-20,H+20);ctx.closePath();ctx.fill();ctx.save();ctx.globalAlpha=0.05;srand(111);for(let i=0;i<400;i++){let gx=rr(0,W),gy=rr(groundY+H*0.02,H);ctx.fillStyle=rand()>0.6?'#FFFFAA':rand()>0.3?'#FFF':'#000';ctx.fillRect(gx,gy,rr(1,3),rr(1,3))}ctx.restore()}
function drawStonePath(){ctx.save();srand(456);for(let i=0;i<9;i++){let t=i/8,px=W*0.06+t*W*0.28,py=groundY+H*0.06+Math.sin(t*2.5)*8+t*H*0.06,sw=10+rand()*8,sh=7+rand()*5,angle=Math.sin(t*3)*0.12;ctx.save();ctx.translate(px,py);ctx.rotate(angle);let sg=ctx.createLinearGradient(-sw/2,0,sw/2,0);sg.addColorStop(0,'#B5A898');sg.addColorStop(0.5,'#CCC0B0');sg.addColorStop(1,'#A89888');ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(0,0,sw/2,sh/2,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(90,70,50,0.15)';ctx.lineWidth=0.5;ctx.stroke();ctx.restore()}ctx.restore()}
function drawPond(){ctx.save();let eg=ctx.createRadialGradient(pondCX,pondCY,pondRX*0.85,pondCX,pondCY,pondRX*1.15);eg.addColorStop(0,'rgba(90,160,100,0.3)');eg.addColorStop(0.5,'rgba(80,140,80,0.2)');eg.addColorStop(1,'rgba(80,140,80,0)');ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(pondCX,pondCY,pondRX*1.12,pondRY*1.2,0,0,Math.PI*2);ctx.fill();let wg=ctx.createRadialGradient(pondCX-pondRX*0.15,pondCY-pondRY*0.2,0,pondCX,pondCY,pondRX);wg.addColorStop(0,'rgba(110,200,230,0.7)');wg.addColorStop(0.3,'rgba(90,190,220,0.6)');wg.addColorStop(0.7,'rgba(70,175,195,0.5)');wg.addColorStop(1,'rgba(55,160,175,0.35)');ctx.fillStyle=wg;ctx.beginPath();ctx.ellipse(pondCX,pondCY,pondRX,pondRY,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(70,110,70,0.2)';ctx.lineWidth=1.5;ctx.stroke();drawWaterEffects();drawLotus();drawReflections();ctx.restore()}
function drawWaterEffects(){ctx.save();ctx.beginPath();ctx.ellipse(pondCX,pondCY,pondRX,pondRY,0,0,Math.PI*2);ctx.clip();for(let i=0;i<4;i++){ctx.strokeStyle=`rgba(255,255,255,${0.08+i*0.02})`;ctx.lineWidth=0.6;ctx.beginPath();let baseY=pondCY-pondRY*0.4+i*pondRY*0.25;for(let x=pondCX-pondRX;x<=pondCX+pondRX;x+=2){let y=baseY+Math.sin(x*0.025+time*0.018+i*1.8)*2.5+Math.sin(x*0.06+time*0.012)*1.2;if(x===pondCX-pondRX)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}if(time%80===0)ripples.push({x:pondCX+rr(-pondRX*0.5,pondRX*0.5),y:pondCY+rr(-pondRY*0.3,pondRY*0.3),r:0,maxR:rr(12,30),alpha:0.4});for(let i=ripples.length-1;i>=0;i--){let r=ripples[i];r.r+=0.25;r.alpha-=0.003;if(r.alpha<=0){ripples.splice(i,1);continue}ctx.strokeStyle=`rgba(255,255,255,${r.alpha})`;ctx.lineWidth=0.7;ctx.beginPath();ctx.ellipse(r.x,r.y,r.r,r.r*0.35,0,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=0.08+Math.sin(time*0.03)*0.04;for(let i=0;i<8;i++){let sx=pondCX+Math.sin(time*0.008+i*1.3)*pondRX*0.7,sy=pondCY+Math.cos(time*0.006+i*2.1)*pondRY*0.5;ctx.fillStyle='rgba(255,255,255,1)';ctx.beginPath();ctx.ellipse(sx,sy,rr(2,5),rr(1,2.5),time*0.01+i,0,Math.PI*2);ctx.fill()}ctx.restore()}

function drawBridge(){ctx.save();let bx=W*0.34,by=groundY+H*0.05,bw=W*0.17,archH=H*0.055;ctx.fillStyle='rgba(50,40,30,0.08)';ctx.beginPath();ctx.ellipse(bx,by+10,bw*0.48,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(80,155,165,0.2)';ctx.beginPath();ctx.ellipse(bx,by+8,bw*0.38,archH*0.45,0,0,Math.PI);ctx.fill();let bg=ctx.createLinearGradient(bx-bw*0.5,by-archH,bx+bw*0.5,by+6);bg.addColorStop(0,'#C8B8A2');bg.addColorStop(0.3,'#D4C8B2');bg.addColorStop(0.7,'#CCBFA8');bg.addColorStop(1,'#B8A890');ctx.fillStyle=bg;ctx.beginPath();ctx.moveTo(bx-bw*0.48,by+6);ctx.quadraticCurveTo(bx-bw*0.48,by-archH*0.25,bx,by-archH);ctx.quadraticCurveTo(bx+bw*0.48,by-archH*0.25,bx+bw*0.48,by+6);ctx.lineTo(bx+bw*0.48,by+9);ctx.quadraticCurveTo(bx+bw*0.48,by-archH*0.15,bx,by-archH+3);ctx.quadraticCurveTo(bx-bw*0.48,by-archH*0.15,bx-bw*0.48,by+9);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(100,80,60,0.15)';ctx.lineWidth=0.5;for(let i=0;i<5;i++){let t=0.12+i*0.16,ly=by-archH+archH*t+6*(1-t),hw=bw*0.48*(0.35+t*0.65);ctx.beginPath();ctx.moveTo(bx-hw,ly);ctx.lineTo(bx+hw,ly);ctx.stroke()}ctx.strokeStyle='#A89880';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(bx-bw*0.46,by+5);ctx.quadraticCurveTo(bx-bw*0.46,by-archH*0.35,bx-bw*0.08,by-archH+3);ctx.stroke();ctx.beginPath();ctx.moveTo(bx+bw*0.46,by+5);ctx.quadraticCurveTo(bx+bw*0.46,by-archH*0.35,bx+bw*0.08,by-archH+3);ctx.stroke();for(let i=0;i<5;i++){let t=0.15+i*0.17,sinT=Math.sin(t*Math.PI),px=bx-bw*0.48+bw*t,py=by-archH*sinT*0.85+6*(1-sinT*0.85);ctx.fillStyle='#A89880';ctx.fillRect(px-1.2,py-7,2.4,7);ctx.fillStyle='#C0B098';ctx.beginPath();ctx.arc(px,py-7,2,0,Math.PI*2);ctx.fill()}ctx.restore()}

function drawPavilion(){let px=W*0.78,py=groundY+H*0.02,s=Math.min(W,H)*0.11;ctx.save();let hg=ctx.createRadialGradient(px,py+s*0.6,0,px,py+s*0.6,s*0.9);hg.addColorStop(0,'#6DA832');hg.addColorStop(0.7,'#5E9A28');hg.addColorStop(1,'rgba(94,154,40,0)');ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(px,py+s*0.6,s*0.85,s*0.22,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#D0C4AE';ctx.beginPath();ctx.ellipse(px,py+s*0.5,s*0.65,s*0.18,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(100,80,60,0.2)';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='#DCD0BC';ctx.beginPath();ctx.ellipse(px,py+s*0.48,s*0.62,s*0.15,0,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='#C8BBA5';roundRect(px-s*0.12,py+s*0.55,s*0.24,s*0.08,2);ctx.fillStyle='#BCAFA0';roundRect(px-s*0.15,py+s*0.61,s*0.3,s*0.04,2);let pillarBot=py+s*0.48,pillarTop=py-s*0.2;for(let i=0;i<6;i++){let a=(i/6)*Math.PI*2-Math.PI/2,cx=px+Math.cos(a)*s*0.42;ctx.fillStyle='rgba(120,30,30,0.1)';ctx.fillRect(cx-2,pillarTop+1,7,pillarBot-pillarTop);let pg=ctx.createLinearGradient(cx-3,0,cx+3,0);pg.addColorStop(0,'#B83220');pg.addColorStop(0.35,'#D44030');pg.addColorStop(0.65,'#D44030');pg.addColorStop(1,'#9A2818');ctx.fillStyle=pg;ctx.fillRect(cx-2.5,pillarTop,5,pillarBot-pillarTop);ctx.fillStyle='#D0C0A8';ctx.fillRect(cx-4,pillarBot-3,8,3)}drawHexRoof(px,pillarTop-2,s*0.68,s*0.38);drawHexRoof(px,pillarTop-s*0.52,s*0.48,s*0.28);ctx.fillStyle='#8B7355';ctx.beginPath();ctx.moveTo(px,pillarTop-s*0.95);ctx.lineTo(px-3,pillarTop-s*0.82);ctx.lineTo(px+3,pillarTop-s*0.82);ctx.closePath();ctx.fill();ctx.fillStyle='#DAA520';ctx.beginPath();ctx.arc(px,pillarTop-s*0.97,3,0,Math.PI*2);ctx.fill();let roof1R=s*0.68*1.15;for(let li=0;li<6;li++){let la=(li/6)*Math.PI*2-Math.PI/2+Math.PI/6,lx=px+Math.cos(la)*roof1R*0.72,ly=pillarTop+s*0.02+Math.sin(la)*roof1R*0.06,ls=s*0.052;ctx.strokeStyle='rgba(160,50,50,0.3)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(lx,ly-ls*3.5);ctx.lineTo(lx,ly-ls*0.8);ctx.stroke();let lglow=ctx.createRadialGradient(lx,ly,0,lx,ly,ls*2);lg function drawHexRoof(cx,cy,radius,height){let sides=6,eaveR=radius*1.15;ctx.save();ctx.globalAlpha=0.08;ctx.fillStyle='#000';ctx.beginPath();for(let i=0;i<sides;i++){let a=(i/sides)*Math.PI*2-Math.PI/2,x=cx+Math.cos(a)*eaveR+3,y=cy+Math.sin(a)*eaveR*0.3+height*0.25+3;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.fill();ctx.restore();ctx.beginPath();let topY=cy-height*0.45,botY=cy+height*0.25;for(let i=0;i<sides;i++){let a=(i/sides)*Math.PI*2-Math.PI/2,x=cx+Math.cos(a)*eaveR,y=cy+Math.sin(a)*eaveR*0.3+height*0.25;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();let rg=ctx.createLinearGradient(cx,topY,cx,botY);rg.addColorStop(0,'#606060');rg.addColorStop(0.4,'#787878');rg.addColorStop(1,'#959595');ctx.fillStyle=rg;ctx.fill();ctx.strokeStyle='rgba(50,50,50,0.2)';ctx.lineWidth=0.8;ctx.stroke();ctx.strokeStyle='rgba(70,55,40,0.2)';ctx.lineWidth=0.7;for(let i=0;i<sides;i++){let a=(i/sides)*Math.PI*2-Math.PI/2,ex=cx+Math.cos(a)*eaveR,ey=cy+Math.sin(a)*eaveR*0.3+height*0.25;ctx.beginPath();ctx.moveTo(cx,topY+height*0.15);ctx.quadraticCurveTo((cx+ex)/2,(topY+ey)/2-3,ex,ey);ctx.stroke()}ctx.strokeStyle='#787878';ctx.lineWidth=2;ctx.lineCap='round';for(let i=0;i<sides;i++){let a=(i/sides)*Math.PI*2-Math.PI/2,ex=cx+Math.cos(a)*eaveR,ey=cy+Math.sin(a)*eaveR*0.3+height*0.25,nx=Math.cos(a)*8,ny=Math.sin(a)*3-5;ctx.beginPath();ctx.moveTo(ex,ey);ctx.quadraticCurveTo(ex+nx*0.5,ey+ny*0.5-3,ex+nx,ey+ny);ctx.stroke();ctx.fillStyle='#A0A0A0';ctx.beginPath();ctx.arc(ex+nx,ey+ny,1.2,0,Math.PI*2);ctx.fill()}}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x+r,y);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill()}
function drawBamboos(){bamboos.forEach(b=>{let topX=b.x+Math.sin(time*0.0012+b.phase)*b.swayAmp;ctx.save();let segs=10,segH=b.h/segs;for(let i=0;i<segs;i++){let t0=i/segs,t1=(i+1)/segs,x0=b.x+(topX-b.x)*t0,x1=b.x+(topX-b.x)*t1,y0=b.baseY-i*segH,y1=b.baseY-(i+1)*segH;let bg=ctx.createLinearGradient(x0-b.thick/2,0,x0+b.thick/2,0);bg.addColorStop(0,'#2D8835');bg.addColorStop(0.35,'#4DB855');bg.addColorStop(0.65,'#42AD4A');bg.addColorStop(1,'#2D8835');ctx.fillStyle=bg;ctx.beginPath();ctx.moveTo(x0-b.thick/2,y0);ctx.lineTo(x1-b.thick*0.45,y1);ctx.lineTo(x1+b.thick*0.45,y1);ctx.lineTo(x0+b.thick/2,y0);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(30,75,30,0.4)';ctx.fillRect(x0-b.thick/2-1,y0,b.thick+2,1.5)}b.leaves.forEach(l=>{let t=l.t,lx=b.x+(topX-b.x)*t,ly=b.baseY-t*b.h,sway=Math.sin(time*0.0018+l.phase)*2;ctx.save();ctx.translate(lx,ly);ctx.rotate(l.angle+sway*0.05);let lg=ctx.createLinearGradient(0,0,l.len*(l.side>0?1:-1),0);lg.addColorStop(0,'rgba(45,155,55,0.85)');lg.addColorStop(0.5,'rgba(65,185,72,0.75)');lg.addColorStop(1,'rgba(50,145,55,0.45)');ctx.fillStyle=lg;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(l.len*0.4,-l.width*0.45,l.len,sway*0.5);ctx.quadraticCurveTo(l.len*0.4,l.width*0.45,0,0);ctx.fill();ctx.strokeStyle='rgba(35,100,40,0.3)';ctx.lineWidth=0.3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(l.len*0.9,sway*0.3);ctx.stroke();ctx.restore()});ctx.restore()})}
function drawRocks(){rocks.forEach(r=>{ctx.save();ctx.translate(r.x,r.y);ctx.fillStyle=`hsl(${r.hue},${r.sat}%,${r.lit}%)`;ctx.beginPath();r.shape.forEach((pt,i)=>{let px=Math.cos(pt.a)*r.w*0.5*pt.r,py=Math.sin(pt.a)*r.h*0.5*pt.r;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)});ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,0.12)';ctx.beginPath();ctx.ellipse(-r.w*0.08,-r.h*0.12,r.w*0.18,r.h*0.13,-0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(40,50,30,0.1)';ctx.beginPath();ctx.ellipse(r.w*0.05,r.h*0.35,r.w*0.4,r.h*0.08,0,0,Math.PI*2);ctx.fill();r.holes.forEach(h=>{ctx.fillStyle='rgba(40,50,40,0.4)';ctx.beginPath();ctx.ellipse(h.cx*r.w,h.cy*r.h,h.rx*r.w,h.ry*r.h,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(20,30,20,0.2)';ctx.beginPath();ctx.ellipse(h.cx*r.w-1,h.cy*r.h-1,h.rx*r.w*0.6,h.ry*r.h*0.6,0,0,Math.PI*2);ctx.fill()});ctx.restore()})}
function drawPetals(){petals.forEach((p,i)=>{p.x+=p.vx+Math.sin(time*0.008+p.swayPh)*p.swayAmp;p.y+=p.vy+Math.sin(time*0.005+p.swayPh*1.3)*0.15;p.rot+=p.rotV;p.life++;if(p.life>p.maxLife||p.y>H*0.92||p.x<-30||p.x>W+30){petals[i]=newPetal();return}let fadeIn=Math.min(1,p.life/30),fadeOut=p.life>p.maxLife-60?(p.maxLife-p.life)/60:1,alpha=p.alpha*fadeIn*Math.max(0,fadeOut);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.pink?`rgba(255,${178+Math.floor(Math.sin(p.rot)*15)},${195+Math.floor(Math.cos(p.rot)*15)},${alpha})`:`rgba(255,${238+Math.floor(Math.sin(p.rot)*10)},${242+Math.floor(Math.cos(p.rot)*8)},${alpha})`;ctx.beginPath();ctx.moveTo(0,-p.size);ctx.bezierCurveTo(p.size*0.7,-p.size*0.4,p.size*0.5,p.size*0.5,0,p.size);ctx.bezierCurveTo(-p.size*0.5,p.size*0.5,-p.size*0.7,-p.size*0.4,0,-p.size);ctx.fill();ctx.restore()})}
function drawButterflies(){butterflies.forEach(b=>{b.angle+=b.speed;b.wingPh+=b.wingSpd;let prevX=b.x;b.x=b.cx+Math.cos(b.angle)*b.rx+Math.sin(b.angle*2.3)*12;b.y=b.cy+Math.sin(b.angle*1.4)*b.ry+Math.cos(b.angle*2.7)*6;b.dir=b.x>prevX?1:-1;let wingOpen=Math.cos(b.wingPh)*0.75+0.25,ws=b.size;ctx.save();ctx.translate(b.x,b.y);ctx.scale(b.dir,1);ctx.globalAlpha=0.88;ctx.fillStyle=b.c1;ctx.save();ctx.scale(wingOpen,1);ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-ws*1.3,-ws*0.9,-ws*1.6,-ws*0.15,-ws*0.4,ws*0.25);ctx.bezierCurveTo(-ws*0.2,ws*0.08,0,0,0,0);ctx.fill();ctx.restore();ctx.save();ctx.scale(-wingOpen,1);ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-ws*1.3,-ws*0.9,-ws*1.6,-ws*0.15,-ws*0.4,ws*0.25);ctx.bezierCurveTo(-ws*0.2,ws*0.08,0,0,0,0);ctx.fill();ctx.restore();ctx.fillStyle=b.c2;ctx.save();ctx.scale(wingOpen,1);ctx.beginPath();ctx.moveTo(0,ws*0.08);ctx.bezierCurveTo(-ws*0.9,ws*0.35,-ws*1.1,ws*0.85,-ws*0.2,ws*0.7);ctx.bezierCurveTo(-ws*0.05,ws*0.5,0,ws*0.25,0,ws*0.08);ctx.fill();ctx.restore();ctx.save();ctx.scale(-wingOpen,1);ctx.beginPath();ctx.moveTo(0,ws*0.08);ctx.bezierCurveTo(-ws*0.9,ws*0.35,-ws*1.1,ws*0.85,-ws*0.2,ws*0.7);ctx.bezierCurveTo(-ws*0.05,ws*0.5,0,ws*0.25,0,ws*0.08);ctx.fill();ctx.restore();ctx.fillStyle='rgba(255,255,255,0.45)';ctx.save();ctx.scale(wingOpen,1);ctx.beginPath();ctx.arc(-ws*0.75,-ws*0.25,ws*0.18,0,Math.PI*2);ctx.fill();ctx.restore();ctx.save();ctx.scale(-wingOpen,1);ctx.beginPath();ctx.arc(-ws*0.75,-ws*0.25,ws*0.18,0,Math.PI*2);ctx.fill();ctx.restore();ctx.globalAlpha=1;ctx.fillStyle='#2C2C2C';ctx.beginPath();ctx.ellipse(0,ws*0.15,1,ws*0.3,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#2C2C2C';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(-0.5,-ws*0.12);ctx.quadraticCurveTo(-ws*0.2,-ws*0.7,-ws*0.28,-ws*0.9);ctx.stroke();ctx.beginPath();ctx.moveTo(0.5,-ws*0.12);ctx.quadraticCurveTo(ws*0.2,-ws*0.7,ws*0.28,-ws*0.9);ctx.stroke();ctx.fillStyle='#2C2C2C';ctx.beginPath();ctx.arc(-ws*0.28,-ws*0.9,0.8,0,Math.PI*2);ctx.fill();ctx.beg function drawWarmOverlay(){ctx.save();ctx.globalAlpha=0.06;let wg=ctx.createRadialGradient(W*0.15,H*0.1,0,W*0.4,H*0.35,W*0.9);wg.addColorStop(0,'#FFF0B0');wg.addColorStop(0.4,'#FFE890');wg.addColorStop(1,'rgba(255,232,144,0)');ctx.fillStyle=wg;ctx.fillRect(0,0,W,H);ctx.globalAlpha=0.025+Math.sin(time*0.008)*0.01;let sx=W*0.15,sy=H*0.1;for(let i=0;i<5;i++){let angle=0.5+i*0.35+Math.sin(time*0.003+i)*0.08,len=W*0.8;ctx.fillStyle='rgba(255,250,200,1)';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(angle)*len,sy+Math.sin(angle)*len);ctx.lineTo(sx+Math.cos(angle+0.06)*len,sy+Math.sin(angle+0.06)*len);ctx.closePath();ctx.fill()}ctx.restore()}
function drawVignette(){ctx.save();ctx.globalAlpha=0.08;let vg=ctx.createRadialGradient(W*0.5,H*0.45,W*0.3,W*0.5,H*0.5,W*0.85);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(30,25,15,1)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);ctx.restore()}

// ===== Main Render Loop =====
function render(){
  time++;
  ctx.save();
  ctx.clearRect(0,0,W,H);
  drawSky();drawSun();drawClouds();drawDistantMountains();drawDistantTreeSilhouettes();
  drawGround();drawStonePath();drawPond();drawBridge();drawRocks();

  drawForegroundGrass();drawPetals();drawButterflies();

  ctx.restore();
  requestAnimationFrame(render);
}

let eggParticles=[],eggBgCache=null;
function openEgg(){
  const es=document.getElementById('egg-scene');
  es.style.display='block';
  requestAnimationFrame(()=>es.classList.add('on'));
  eggBgCache=null;
  initEggCanvas();
  eggParticles=[];
  for(let i=0;i<40;i++) eggParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight*.8,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.4,r:1.5+Math.random()*2,phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.03,type:'firefly'});
  function spawnStar(){eggParticles.push({x:Math.random()*window.innerWidth,y:0,vx:2+Math.random()*3,vy:1.5+Math.random()*2,life:1,type:'star'});setTimeout(spawnStar,2000+Math.random()*4000)}
  setTimeout(spawnStar,1500);
  tickEgg();
}
function initEggCanvas(){
  const c=document.getElementById('egg-canvas');
  const dpr=devicePixelRatio||1;
  const lw=window.innerWidth,lh=window.innerHeight;
  c.width=lw*dpr;c.height=lh*dpr;
  // draw static bg once (scale context so all coords stay in logical px)
  const ctx2=c.getContext('2d');
  ctx2.setTransform(dpr,0,0,dpr,0,0);
  const oc=document.createElement('canvas');oc.width=lw*dpr;oc.height=lh*dpr;
  const octx=oc.getContext('2d');
  octx.setTransform(dpr,0,0,dpr,0,0);
  const mx=lw*.75,my=lh*.18,mr=Math.min(lw,lh)*.08;
  octx.save();octx.beginPath();octx.arc(mx,my,mr,0,Math.PI*2);
  const mg=octx.createRadialGradient(mx,my,0,mx,my,mr);mg.addColorStop(0,'#f0e8d0');mg.addColorStop(.7,'#e0d0b0');mg.addColorStop(1,'#c8b890');octx.fillStyle=mg;octx.fill();
  octx.beginPath();octx.arc(mx,my,mr*2,0,Math.PI*2);const mg2=octx.createRadialGradient(mx,my,mr*.8,mx,my,mr*2);mg2.addColorStop(0,'rgba(220,210,180,.15)');mg2.addColorStop(1,'rgba(220,210,180,0)');octx.fillStyle=mg2;octx.fill();octx.restore();
  octx.save();for(let i=0;i<60;i++){const sx=Math.random()*lw,sy=Math.random()*lh*.6,sr=.4+Math.random()*1.2;octx.globalAlpha=.3+Math.random()*.5;octx.fillStyle='#e0d8c0';octx.beginPath();octx.arc(sx,sy,sr,0,Math.PI*2);octx.fill()}octx.restore();
  octx.save();octx.globalAlpha=.6;octx.fillStyle='#0e1828';octx.beginPath();octx.moveTo(0,lh*.7);octx.quadraticCurveTo(lw*.15,lh*.45,lw*.3,lh*.6);octx.quadraticCurveTo(lw*.45,lh*.42,lw*.6,lh*.58);octx.quadraticCurveTo(lw*.8,lh*.38,lw,lh*.55);octx.lineTo(lw,lh);octx.lineTo(0,lh);octx.fill();octx.restore();
  octx.save();octx.globalAlpha=.8;octx.fillStyle='#0a1220';
  function drawTree(ctx,x,h,size){ctx.fillRect(x-size*.06,h*.3,size*.12,h*.7);ctx.beginPath();ctx.arc(x,h*.25,size*.28,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x-size*.15,h*.38,size*.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+size*.15,h*.36,size*.22,0,Math.PI*2);ctx.fill()}
  drawTree(octx,lw*.12,lh*.68,50);drawTree(octx,lw*.88,lh*.65,60);drawTree(octx,lw*.25,lh*.72,35);
  octx.restore();
  eggBgCache=oc;
}
function tickEgg(){
  const c=document.getElementById('egg-canvas');
  const ctx2=c.getContext('2d');
  const dpr=devicePixelRatio||1;
  ctx2.setTransform(1,0,0,1,0,0);
  ctx2.clearRect(0,0,c.width,c.height);
  ctx2.setTransform(dpr,0,0,dpr,0,0);
  if(eggBgCache) ctx2.drawImage(eggBgCache,0,0);
  eggParticles=eggParticles.filter(p=>{
    if(p.type==='firefly'){
      p.phase+=p.speed;p.x+=p.vx+Math.sin(p.phase)*.3;p.y+=p.vy+Math.cos(p.phase*.7)*.2;
      if(p.x<-20)p.x=window.innerWidth+20;if(p.x>window.innerWidth+20)p.x=-20;if(p.y<-20)p.y=window.innerHeight+20;if(p.y>window.innerHeight+20)p.y=-20;
      const alpha=.4+Math.sin(p.phase)*.35;ctx2.save();ctx2.globalAlpha=Math.max(0,alpha);
      const g=ctx2.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);g.addColorStop(0,'rgba(200,240,120,.6)');g.addColorStop(1,'rgba(200,240,120,0)');ctx2.fillStyle=g;ctx2.beginPath();ctx2.arc(p.x,p.y,p.r*4,0,Math.PI*2);ctx2.fill();
      ctx2.fillStyle='#d0f060';ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);ctx2.fill();ctx2.restore();return true;
    }
    if(p.type==='star'){
      p.x+=p.vx;p.y+=p.vy;p.life-=.015;if(p.life<=0)return false;
      ctx2.save();ctx2.globalAlpha=p.life;ctx2.strokeStyle='#f0e8d0';ctx2.lineWidth=1.5;ctx2.lineCap='round';ctx2.beginPath();ctx2.moveTo(p.x,p.y);ctx2.lineTo(p.x-p.vx*8,p.y-p.vy*8);ctx2.stroke();ctx2.restore();return true;
    }
    return false;
  });
  eggAnimId=requestAnimationFrame(tickEgg);
}
function closeEgg(){
  document.getElementById('egg-scene').classList.remove('on');
  if(eggAnimId){cancelAnimationFrame(eggAnimId);eggAnimId=null;}
  setTimeout(()=>{document.getElementById('egg-scene').style.display='none';},400);
  eggBgCache=null;
}

// ===== Burst (HTML particles) =====
function burst(pos){
  const COLS=['#d89098','#e0a8b4','#c87080','#f0c0b0','#e8c0a0','#f0d488'];
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,spd=2+Math.random()*3;
    const el=document.createElement('div');
    const sz=4+Math.random()*5;
    const col=COLS[Math.floor(Math.random()*COLS.length)];
    el.style.cssText=`position:fixed;pointer-events:none;z-index:50;border-radius:50%;width:${sz}px;height:${sz}px;background:${col};left:${pos.x}px;top:${pos.y}px;opacity:0.8;transition:all .8s ease-out;`;
    document.body.appendChild(el);
    requestAnimationFrame(()=>{
      el.style.left=(pos.x+Math.cos(a)*spd*30)+'px';
      el.style.top=(pos.y+Math.sin(a)*spd*30-20)+'px';
      el.style.opacity='0';el.style.transform='scale(0.3)';
    });
    setTimeout(()=>el.remove(),900);
  }
}

  const d=days();
  document.getElementById('cdn').textContent=d;
  document.getElementById('lcd').textContent=d;
  if(d===0)document.getElementById('cdc').textContent='今天见你！';
  // init canvas
  W = cv.width = window.innerWidth * dpr;
  H = cv.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W /= dpr; H /= dpr;
  regenerate();
  render();
  window.addEventListener('resize',()=>{
    W = cv.width = window.innerWidth * dpr;
    H = cv.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W /= dpr; H /= dpr;
    regenerate();
  });
  // show scene after loading
  setTimeout(()=>{
    const ld=document.getElementById('loading');ld.style.opacity='0';
    setTimeout(()=>{
      ld.style.display='none';
      document.getElementById('scene').style.display='block';
    },1000);
  },1400);
});
</script>
</body>
</html>
